const AI_SYS = `You are the AI assistant for "Wanderings In Middle Earth Wiki" — a D&D campaign set in Tolkien's Middle-earth. You know all player-facing events through Session 17.2. Party: Borin (Josh, Dwarf Warden), Carl (Tyler, Human Fighter/Champion), Dudo (Calvin, Halfling Rogue), Gilgamesh (Aaron, Elf archer), Mayo (Alec, Dwarf healer), Mungo (Jesse/DM, Hobbit treasure hunter), Tyr (Gabe, Human Ranger of the North). Current status: Party ascending Misty Mountains toward Lake Town. Session 18 opens mid-initiative vs two owlbears (one hit for 20 damage). Mission: retrieve the Palantir from Lake Town before the Enemy can use it. Tyr holds the key ring. Key facts: Red Claw orc army destroyed at Bree (Session 4). Maldwin killed by Mungo's blind dagger throw (Session 15). Ben (civilian, 19) was killed by Maldwin when he charged him. Black Speech booklet stolen by Eli the Tinker. Be helpful, accurate, immersive. Only share player-facing knowledge.`;

async function askClaude(messages) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:AI_SYS,messages})});
    const data = await res.json();
    return data.content?.[0]?.text || "The wiki spirits are unavailable right now.";
  } catch { return "Could not reach the AI. Please try again."; }
}

const cin = {fontFamily:"'Cinzel','Times New Roman',serif"};
const cri = {fontFamily:"'Crimson Text',Georgia,serif"};

function Cin({children,sz=13,col,style={}}) {
  return <span style={{...cin,fontSize:sz,color:col||C.gl,letterSpacing:"0.06em",...style}}>{children}</span>;
}

function Badge({label,col}) {
  return <span style={{background:col+"22",color:col,border:`1px solid ${col}44`,borderRadius:3,padding:"2px 8px",fontSize:10,...cin,letterSpacing:"0.06em"}}>{label}</span>;
}

function SBadge({s}) {
  if(s.includes("DECEASED")) return <Badge label="Deceased" col={C.re}/>;
  if(s.includes("UNKNOWN")) return <Badge label="Unknown" col={C.gd}/>;
  if(s.includes("HOSTILE")) return <Badge label="Hostile" col={C.re}/>;
  return <Badge label="Alive" col="#4a8a46"/>;
}

function Card({children,onClick,style={}}) {
  const [hov,setHov]=useState(false);
  return <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{background:C.s2,border:`1px solid ${hov&&onClick?C.gd:C.bd}`,borderRadius:8,padding:"13px 15px",cursor:onClick?"pointer":"default",transition:"border-color 0.15s",marginBottom:10,...style}}>
    {children}
  </div>;
}

function Coll({title,children,open:def=false}) {
  const [open,setOpen]=useState(def);
  return <div style={{borderTop:`1px solid ${C.bd}`}}>
    <button onClick={()=>setOpen(!open)} style={{width:"100%",background:"none",border:"none",padding:"9px 0",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>

    </button>
    {open&&<div style={{paddingBottom:12,...cri,fontSize:15,color:C.tx,lineHeight:1.7}}>{children}</div>}
  </div>;
}

function Back({onClick,label="Back"}) {

function PH({title,sub}) {

function AiPage() {
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);
  const send=async()=>{
    if(!input.trim()||loading) return;
    const m={role:"user",content:input};
    const next=[...msgs,m];
    setMsgs(next);setInput("");setLoading(true);
    const reply=await askClaude(next);
    setMsgs(prev=>[...prev,{role:"assistant",content:reply}]);
    setLoading(false);
  };
  return <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <PH title="Wiki AI" sub="Ask anything about the campaign"/>
    <div ref={ref} style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
      {msgs.length===0&&<Card style={{textAlign:"center",padding:"20px 16px"}}><div style={{...cri,fontSize:15,color:C.dm,fontStyle:"italic",lineHeight:1.7}}>Ask me anything — characters, events, NPCs, what happened in a specific session, lore, items. I know everything through Session 17.2.</div></Card>}
      {msgs.map((m,i)=><div key={i} style={{marginBottom:10}}>
        <Cin sz={10} col={m.role==="user"?C.g:C.gd} style={{letterSpacing:"0.1em",display:"block",marginBottom:4}}>{m.role==="user"?"YOU":"WIKI AI"}</Cin>
        <Card style={{background:m.role==="user"?C.s3:C.s2}}><div style={{...cri,fontSize:15,color:C.tx,lineHeight:1.7}}>{m.content}</div></Card>
      </div>)}
      {loading&&<Card><div style={{...cri,fontSize:15,color:C.dm,fontStyle:"italic"}}>Consulting the scrolls of Middle-earth…</div></Card>}
    </div>
    <div style={{padding:"10px 16px",borderTop:`1px solid ${C.bd}`,display:"flex",gap:8,flexShrink:0}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask about the campaign…" style={{flex:1,background:C.s3,border:`1px solid ${C.bd}`,color:C.tx,borderRadius:6,padding:"10px 12px",...cri,fontSize:15}}/>
      <button onClick={send} disabled={loading} style={{background:C.gd,border:"none",color:C.bg,padding:"10px 16px",borderRadius:6,cursor:"pointer",...cin,fontSize:12}}>Ask</button>
    </div>
  </div>;
}

// ── APP ──────────────────────────────────────────────────────

const TABS=[{id:"home",label:"Home",icon:"🏠"},{id:"party",label:"Party",icon:"⚔️"},{id:"world",label:"World",icon:"🌍"},{id:"sessions",label:"Sessions",icon:"📖"},{id:"more",label:"More",icon:"✦"}];
const MORE=[{id:"items",label:"Items",icon:"💎"},{id:"mysteries",label:"Mysteries",icon:"❓"},{id:"moments",label:"Moments",icon:"⭐"},{id:"suggestions",label:"Suggestions",icon:"💬"},{id:"ai",label:"Wiki AI",icon:"🔮"}];

function App() {
  const [page,setPage]=useState("home");
  const [more,setMore]=useState(false);
  const [worldTab,setWorldTab]=useState("npcs");
  const [sugs,setSugs]=useState(()=>lsGet("mew-sugs")||[]);
  const [edits,setEdits]=useState(()=>lsGet("mew-edits")||{});

  const go=p=>{setPage(p);setMore(false);};
  const onSaveNote=(id,note)=>{const e={...edits,[id]:{...(edits[id]||{}),note}};setEdits(e);lsSet("mew-edits",e);};
  const onAddSug=s=>{const arr=[...sugs,s];setSugs(arr);lsSet("mew-sugs",arr);};

  const renderPage=()=>{
    if(page==="home") return <Home go={go}/>;
    if(page==="party") return <Party edits={edits} onSave={onSaveNote}/>;
    if(page==="world") return <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <div style={{display:"flex",gap:8,padding:"12px 16px 0",flexShrink:0}}>
        {[["npcs","NPCs"],["locations","Locations"]].map(([id,label])=><button key={id} onClick={()=>setWorldTab(id)} style={{flex:1,background:worldTab===id?C.gd:C.s2,border:`1px solid ${worldTab===id?C.gd:C.bd}`,color:worldTab===id?C.bg:C.dm,padding:8,borderRadius:6,cursor:"pointer",...cin,fontSize:12,letterSpacing:"0.05em"}}>{label}</button>)}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>{worldTab==="npcs"?<Npcs/>:<Locs/>}</div>
    </div>;
    if(page==="sessions") return <Sessions/>;
    if(page==="items") return <Items/>;
    if(page==="mysteries") return <Mysteries/>;
    if(page==="moments") return <Moments/>;
    if(page==="suggestions") return <Suggestions sugs={sugs} onAdd={onAddSug}/>;
    if(page==="ai") return <AiPage/>;
    return <Home go={go}/>;
  };

  return <div style={{background:C.bg,color:C.tx,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",fontFamily:"'Crimson Text',Georgia,serif"}}>
    {more&&<div style={{position:"absolute",bottom:60,left:0,right:0,background:C.s1,borderTop:`1px solid ${C.bd}`,padding:"12px 16px",zIndex:20}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
        {MORE.map(m=><button key={m.id} onClick={()=>go(m.id)} style={{background:C.s2,border:`1px solid ${C.bd}`,color:C.gl,padding:"11px 10px",borderRadius:7,cursor:"pointer",...cin,fontSize:12,letterSpacing:"0.05em",textAlign:"left",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{m.icon}</span>{m.label}</button>)}
      </div>
    </div>}
    <div style={{flex:1,overflowY:"auto"}}>{renderPage()}</div>
    <nav style={{height:60,background:C.s1,borderTop:`1px solid ${C.bd}`,display:"flex",flexShrink:0}}>
      {TABS.map(t=>{
        const active=t.id==="more"?more:(page===t.id&&!more);
        return <button key={t.id} onClick={()=>t.id==="more"?setMore(!more):go(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,color:active?C.gl:C.mt,borderTop:active?`2px solid ${C.g}`:"2px solid transparent",transition:"all 0.15s"}}>
          <span style={{fontSize:18}}>{t.icon}</span>
          <span style={{...cin,fontSize:9,letterSpacing:"0.05em"}}>{t.label}</span>
        </button>;
      })}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
