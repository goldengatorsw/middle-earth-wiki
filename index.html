<script>

// ── HELPERS ──────────────────────────────────────────────────
function el(tag, props, html) {
  const e = document.createElement(tag);
  if (props) for (const [k,v] of Object.entries(props)) {
    if (k === 'cls') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on')) e[k] = v;
    else e.setAttribute(k, v);
  }
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function cin(s) { return '<span style="font-family:Cinzel,serif">' + s + '</span>'; }
function back(label, fn) {
  const b = el('button', {cls:'back'}, '← ' + label);
  b.onclick = fn;
  return b;
}
function coll(title, items, open) {
  const d = el('div', {cls:'coll'});
  const btn = el('button', {cls:'coll-btn'}, '<span>' + title + '</span><span>' + (open?'▲':'▼') + '</span>');
  const body = el('div', {cls:'coll-body', style: open?'':'display:none'});
  items.forEach(i => {
    const r = el('div', {cls:'row'});
    r.innerHTML = '<div class="dot">·</div><div style="font-size:15px;line-height:1.65">' + i + '</div>';
    body.appendChild(r);
  });
  btn.onclick = () => {
    const vis = body.style.display !== 'none';
    body.style.display = vis ? 'none' : 'block';
    btn.querySelector('span:last-child').textContent = vis ? '▼' : '▲';
  };
  d.appendChild(btn); d.appendChild(body);
  return d;
}

// ── STATE ────────────────────────────────────────────────────
let page = 'home', detail = null, more = false, momTab = 'epic', worldTab = 'npcs';
let edits = {};
try { edits = JSON.parse(localStorage.getItem('mew-edits')||'{}'); } catch(e){}

function navigate(p, d, skipHistory) {
  page = p; detail = d||null; more = false;
  if (!skipHistory) {
    history.pushState({page:p,detail:d||null}, '', d ? '#'+p+'/'+d : '#'+p);
  }
  render();
}
window.addEventListener('popstate', e => {
  if (e.state) { page = e.state.page||'home'; detail = e.state.detail||null; }
  else { page='home'; detail=null; }
  more = false; render();
});

ring \u2014 Elrond gave it to Tyr anyway"]}, {"id": "mayo", "name": "Mayo (May O.)", "player": "Alec", "race": "Dwarf Captain / Healer", "tag": "The reliable backbone. Makes sure things don't fall apart.", "bio": "Mayo pumped the artesian well while wounded at ~4 HP. They ran 30 feet to slam the wardrobe shut on the zombie horde \u2014 strength 12, barely made it. Tried to tame an evil wolf three times. It had just eaten a family. It refused every time.", "facts": ["Protection: impose disadvantage on attacks against adjacent allies", "Ran 30 feet to slam wardrobe shut \u2014 prevented a fight-ending zombie wave", "Went down to a zombie bite \u2014 death save Nat 20 \u2014 stabilized at 1 HP", "Let Tyr stand on her shoulders to reach the ceiling node"], "funny": ["Tried to tame an evil wolf three times with patient animal handling. It refused every time.", "Mungo kept nudging the wagon horses faster when she told him to slow down, grinning", "That hurt. \u2014 first words after Borin woke her from death's door with face-slaps"]}, {"id": "mungo", "name": "Mungo Grubb", "player": "Jesse (DM)", "race": "Hobbit Treasure Hunter", "tag": "More dangerous than he looks. Much more.", "bio": "Mungo is a cheerful hobbit who used to be a burglar and has a personal friendship with Beorn. He silently killed three orcs inside a burning farmhouse \u2014 Gilgamesh watched from 200 feet and never heard a sound. He threw a dagger blind, running, on disadvantage, and hit Maldwin in the head for the killing blow.", "facts": ["Former burglar \u2014 Beorn caught him stealing and they became genuine friends over 7 years", "Silent triple kill inside the burning farmhouse \u2014 Gilgamesh never heard a thing", "Catapulted to the ceiling by Tyr + Borin (strength check 24 + 21)", "Blind dagger throw, running, on disadvantage \u2014 hit Maldwin in the head. The killing blow."], "funny": ["Health potion turned nasty yellow after dipping a sanitizing finger in it", "Kept nudging the wagon horses f inely kind; even 300 orcs is a small band by fortress standards."}, {"id": "eli", "name": "Eli the Tinker", "status": "hostile", "role": "Enemy Operative", "desc": "Appeared helpful. Was lying. Distributed cursed obsidian pendants, engineered capture via poisoned mead, offered a join or die ultimatum. Escaped with the Black Speech booklet. Reports to an unknown boss."}, {"id": "maldwin", "name": "Maldwin", "status": "dead", "role": "The Last Sea Warden", "desc": "Centuries-old human driven mad by grief. Planted a Valinor seed and fed it blood for 19 winters to build a zombie army aimed at Rivendell. Killed by Mungo's blind dagger throw. The party was two days from Rivendell the whole time."}, {"id": "ben", "name": "Ben", "status": "dead", "role": "Civilian Companion", "desc": "19 years old. His brother Tom was sacrificed in the village lottery. Followed the party into the swamp alone. When he saw Maldwin, he charged without words or hesitation. Killed instantly. He died doing the only thing he had left to do."}, {"id": "mez", "name": "Mez", "status": "unknown", "role": "Innkeeper, Sacrificial Village", "desc": "Innkeeper of the unnamed sacrificial village. His wife was sacrificed five moons before the party arrived. Status unknown after the bat raid."}, {"id": "bonkey", "name": "Bonkey", "status": "unknown", "role": "Water-Fetcher, Sacrificial Village", "desc": "The only villager permitted outside. Found muttering just gotta make it through another night. Led the party unknowingly to the village. Wore an iron medallion shaped like an open mouth."}];

o into dark tunnels alone", "Arrived at the cave entrance just as Mayo burst through the vines \u2014 initiative called", "TROLL FIGHT: All three trolls killed; Gilgamesh pulled the leader's loincloth \u2014 it fell prone; Mungo scored Nat 20 + Nat 19 (Keen) for 45 damage; Borin delivered the killing blow on the one that had spotted him", "Jet-black dagger found inside one troll's thigh \u2014 the body had grown flesh around it; perfectly sized for a halfling", "Party leveled up to Level 4"]}, {"num": "10.2", "title": "The Long Night After", "summary": "Horn dispute \u2014 Carl knocked Dudo unconscious and broke his kneecap. Borin forced reconciliation. Ravine ambush \u2014 Carl's liver wound. Eli the Tinker appeared with the recovered wagon.", "events": ["Morning: Dudo tried to blow the Horn; Carl grabbed it back; Mungo swung at Carl; escalating chaos", "Borin slammed Horic's Iron Hand Fang into the ground \u2014 DC 13 knockdown; Carl and Dudo went prone; Gilgamesh soaked himself", "Carl's greataxe accidentally knocked Dudo unconscious; Dudo broke his kneecap on a rock (8-day injury)", "Borin picked up Mungo and threw him at Gilgamesh (caught like a torpedo); placed Carl and Dudo facing each other; forced reconciliation", "Mungo dipped his finger in his health potion to sanitize \u2014 the potion turned from gold to nasty yellow", "Ravine ambush: 5 orcs each side + goblin archers at the top; poison arrows", "Carl's liver was stabbed \u2014 0 HP; poisoned condition: 2 days, cannot drink alcohol", "Gilgamesh used Ring of Mending to revive Carl; Carl immediately got up and hit the orc that dropped him", "Mungo yelled FOR CARL! charging up the cliff at the goblin archer \u2014 then killed him", "Eli the Tinker appeared driving the party's wagon \u2014 claimed he found it abandoned in a field"]}, {"num": "11", "title": "The Tinker's Teeth", "summary": "Eli's true nature revealed. Cursed pendants. Poisoned mead \u2014 entire party fell except Borin and Tyr. Captured, imprisoned in a pit. Join or die ultimatum. Beorn killed all six bandits alone in the dark. Eli escaped with the Black Speech booklet.", "events": ["Eli led the party to a circular ruin; distributed obsidian pendant trinkets as good luck charms \u2014 secretly cursed attunement devices", "Party slept with pendants \u2014 became attuned to Eli's mental assault power", "Merchant caravan offered mead; Borin and Tyr resisted (Con 17+); everyone else fell unconscious", "Six bandit horsemen surrounded the wagon; Borin and Tyr fought 2v6; both eventually hog-tied", "Woke as prisoners \u2014 Borin recognized Eli's voice, confirming he directed the bandits", "Brought to a briar-patch camp; thrown into a pit 7-8 feet deep under a stone grate; all weapons removed", "In the pit: overheard bandits \u2014 they failed to find a specific item in Bree that the orcs were supposed to help them access; they must report to the boss", "That item was the Palantir \u2014 which Elrond had already moved to Lake Town", "Eli brought them out: makeshift throne, whole lamb roasting, join us or die ultimatum", "Eli demonstrated pendant control: snapped his fingers \u2014 Carl's eyes rolled back; 30-second jolt dropped Carl to the ground", "Party returned to pit; took a full long rest", "Night: Beorn arrived in bear form \u2014 glowing red eyes; killed all six bandits alone in the dark; lifted the stone grate; pulled Mungo out first", "Mungo threw a knife and ladder down for the rest; everyone freed", "Beorn warned: war is brewing in the east; reach Elrond immediately; explained the pendant curse", "Eli was NOT among the six bodies \u2014 escaped with the Black Speech booklet, the wagon, and both horses", "Mungo lit the briar camp on fire \u2014 it burned completely", "Three days walking to Rivendell on foot"]}, {"num": "12", "title": "The Last Road to Rivendell", "summary": "Corrupted wolves \u2014 do NOT burn (toxic green mist). Illusory waterfall entrance. The healing pool at Rivendell cleared every ailment any party member had carried since the campaign began.", "events": ["Final stretch east; vegetation increasingly sickly and green-tinged", "Corrupted wolves encountered \u2014 produce toxic green mist when burned; DO NOT use fire against these", "An illusory waterfall appeared across the road; Mayo walked into it and disappeared; emerged in the Rivendell valley", "First sight of Rivendell: a bowl of peace, tucked beneath the immense shoulders of the mountains", "Two elven guards escorted the party to a bathing chamber with a natural heated pool", "The healing pool cleared every ailment, wound, curse, scar, and condition for everyone \u2014 Tyr's paranoia lifted; Dudo's kneecap healed", "Borin stripped immediately the moment the guards left \u2014 first naked into the pool", "Dudo to Carl in the pool: I think I can finally fully forgive you. My knee \u2014 it feels\u2026 Carl: I think I can finally forgive you for touching my horn.", "Party given silver-gray elven robes and told Elrond would receive them when ready"]}, {"num": "13", "title": "The Last Homely House", "summary": "Elrond's audience \u2014 Palantiri revealed, mission given, key ring assigned to Tyr. Drinking contest aftermath. Sacrificial village found. A 16-year-old drawn in the lottery and sacrificed. Salted pork feast used to escape.", "events": ["Elrond was already aware of the party \u2014 Aragorn had been filing reports on Tyr specifically", "Elrond revealed the Palantiri: nine seeing stones; the Enemy possesses at least one", "Elrond placed a Palantir in Bree \u2014 the Red Claw assault and Eli's operation were both attempts to locate it; Elrond moved it to Lake Town first", "Mission: retrieve the Palantir from Lake Town before the Enemy uses or corrupts the master of Lake Town", "Gilgamesh protested giving Tyr the key ring \u2014 Elrond gave it to Tyr anyway", "Tyr's response: For sure gonna touch that Palantir.", "Elrond inscribed elvish runes personally into Tyr's sword \u2014 now +1 emaining; the killing blow", "The table erupted."]}, {"num": "16", "title": "The Seed of the Fallen Trees", "summary": "Second zombie wave through the walls. Dudo's sword hit Tyr's neck \u2014 0 HP from friendly fire. Mayo's death save Nat 20. Mungo catapulted to ceiling. Dudo carved the node free with a Nat 20 \u2014 all zombies dropped. Tyr found the Iron of Death. Level up.", "events": ["Three zombies up the vine ramp immediately; Tyr climbed onto Mayo's shoulders", "Tyr attacked the ceiling node (Nat 20 + 21 \u2014 took lower at disadvantage); 16 damage; all zombies briefly seized", "Dudo climbed the ceiling; sword knocked from his hand \u2014 fell onto Tyr's neck; Tyr went to 0 HP from friendly fire; Ring of Mending revived him", "6-7 zombie breach points through the walls simultaneously \u2014 second wave from all directions", "Mungo threw his dagger up to Dudo (Nat 20 \u2014 stuck into ceiling center); Dudo grabbed it", "Borin's Baruch Kazan (DC 15 Charisma): 5 of 6 zombies became frightened simultaneously", "Carl used Leadership: 4 HP granted to Tyr, Gilgamesh, Borin, and Mungo simultaneously", "Mayo went down to a zombie bite \u2014 death save Nat 20 \u2014 stabilized at 1 HP; Borin woke her with face-slaps; first words: That hurt", "Tyr went down a second time at 1 HP; Gilgamesh poured health potion (Medicine 6 \u2014 botched; went down wrong pipe; spent rest of fight coughing)", "Tyr and Borin catapulted Mungo to ceiling (strength Nat 20 + 4 = 24); Mungo drove short sword into node for 14 damage", "Dudo carved the node free with Nat 20 \u2014 approximately 19 damage; gray seed pod fell from ceiling", "All zombies dropped simultaneously; Maldwin's body dissolved into gray goo", "Tyr's Nat 20 Lore check: corrupted lineage of the Two Trees of Valinor; planted to breed an army for Rivendell; the party was TWO DAYS from Rivendell the entire time", "Tyr found the Iron of Death buried in the weapons pile \u2014 the only item in perfect condition", "Party leveled // ── BADGE ─────────────────────────────────────────────────────
function badge(status) {
  const map = {alive:'Alive',safe:'Alive - Safe',hostile:'Hostile',dead:'Deceased',unknown:'Unknown'};
  const col = (status==='alive'||status==='safe') ? '#4a8a46' : status==='dead'||status==='hostile' ? '#8b2828' : '#7a6030';
  const d = el('span', {style:`background:${col}22;color:${col};border:1px solid ${col}44;border-radius:3px;padding:2px 8px;font-size:10px;font-family:Cinzel,serif;letter-spacing:.06em`});
  d.textContent = map[status]||status;
  return d;
}

function renderCharDetail(c) {
  const p = el('div', {cls:'page'});
  const inner = el('div', {style:'padding:0 16px'});
  inner.appendChild(back('Party', () => navigate('party')));
  const header = el('div', {style:'margin-bottom:14px'});
  header.innerHTML = `<div style="font-family:Cinzel,serif;font-size:18px;color:#e6cc84">${c.name}</div><div style="color:#9a8a6a;font-size:13px">${c.player} - ${c.race}</div>`;
  inner.appendChild(header);
  const bio = el('div', {cls:'card', style:'margin-bottom:10px'});
  bio.innerHTML = `<p style="font-style:italic;color:#e6cc84;font-size:15px;line-height:1.6;margin-bottom:8px">"${c.tag}"</p><p style="font-size:15px;line-height:1.7">${c.bio}</p>`;
  inner.appendChild(bio);
  inner.appendChild(coll('KEY FACTS', c.facts, true));
  inner.appendChild(coll('FUNNY MOMENTS', c.funny, false));
  // Notes
  const noteSection = el('div', {style:'margin-top:16px;border-top:1px solid #383020;padding-top:14px'});
  noteSection.innerHTML = '<div class="lbl" style="margin-top:0">YOUR NOTES (saves in browser)</div>';
  const saved = (edits[c.id]||{}).note||'';
  const noteDisplay = el('div', {cls:'note-area'+(saved?' has':'')});
  noteDisplay.textContent = saved || 'Click to add your own notes...';
  const noteEdit = el('div', {style:'display:none'});
  const ta = el('textarea'); ta.value = saved; ta.placeholder = 'Add your own notes...';
  const btns = el('div', {style:'display:flex;gap:8px;margin-top:8px'});
  const saveBtn = el('button', {cls:'btn', style:'background:#7a6030;border:none;color:#0d0b08;padding:6px 14px;border-radius:5px;font-family:Cinzel,serif;font-size:11px'}, 'Save');
  const cancelBtn = el('button', {cls:'btn', style:'background:none;border:1px solid #383020;color:#9a8a6a;padding:6px 14px;border-radius:5px;font-family:Cinzel,serif;font-size:11px'}, 'Cancel');
  saveBtn.onclick = () => {
    edits[c.id] = {...(edits[c.id]||{}), note: ta.value};
    try { localStorage.setItem('mew-edits', JSON.stringify(edits)); } catch(e){}
    noteDisplay.textContent = ta.value || 'Click to add your own notes...';
    noteDisplay.className = 'note-area' + (ta.value ? ' has' : '');
    noteEdit.style.display = 'none'; noteDisplay.style.display = 'block';
  };
  cancelBtn.onclick = () => { noteEdit.style.display='none'; noteDisplay.style.display='block'; };
  noteDisplay.onclick = () => { ta.value=(edits[c.id]||{}).note||''; noteDisplay.style.display='none'; noteEdit.style.display='block'; };
  btns.appendChild(saveBtn); btns.appendChild(cancelBtn);
  noteEdit.appendChild(ta); noteEdit.appendChild(btns);
  noteSection.appendChild(noteDisplay); noteSection.appendChild(noteEdit);
  inner.appendChild(noteSection);
  p.appendChild(inner);
  return p;
}

// ── PAGE: NPCs ────────────────────────────────────────────────
function renderNPCs() {
  if (detail) {

  const p = el('div', {cls:'page'});

    const list = NPCS.filter(fn);
    if (!list.length) return;
    const lbl = el('div', {cls:'lbl'}); lbl.textContent = label.toUpperCase();
    inner.appendChild(lbl);
    list.forEach(n => {

      c.querySelector('div>div').appendChild(badge(n.status));
      c.onclick = () => navigate('npcs', n.id);

s quarters. All cleared.",facts:["Dudo's blood activated the bone altar — multiplied on contact","A BOAT was tied to the far side THE ENTIRE TIME. Carl had seen it. Said nothing.","Mayo ran 30 feet to slam the wardrobe shut — prevented a fight-ending zombie wave","Dudo carved the ceiling node free with a Nat 20 — all zombies dropped","Tyr found the Iron of Death buried in the weapons pile here"]},{id:"mountains",name:"The Misty Mountains",status:"CURRENT LOCATION",desc:"The party is ascending the High Pass northeast toward Lake Town. ~1,000 feet elevation. Session 18 opens mid-initiative.",facts:["~1,000 feet elevation on the High Pass heading northeast","Giant bat creatures observed flying north carrying humanoid corpses","Orc ping within 3 miles at dusk camp","Two large unknown creatures at camp — SESSION 18 STARTS HERE"]}];

// ── PAGE: BESTIARY ────────────────────────────────────────────
function renderBestiary() {
  const BEST=[{name:"Red Claw Orcs",status:"Destroyed as a field force",threat:"High",desc:"More organized than typical orcs — written Black Speech orders, fire arrows, battering ram. They were an instrument of something larger.",tactics:["Take damage in direct sunlight — always seek cover, shoot from windows","Wolf mounts fear fire: must save or become frightened","Written Black Speech orders confirm organized command above the chieftain level"]},{name:"Corrupted Wolves",status:"Encountered",threat:"High",desc:"Wolves affected by Dol Guldur's corruption near Rivendell. DO NOT BURN — produce toxic green mist when killed by fire.",tactics:["Produce toxic green mist when burned — do not use fire against these","Significantly more aggressive and durable than normal wolves"]},{name:"Trolls",status:"All killed",threat:"Very High",desc:"Three trolls in a cave east of the farmstead. Have pride and social hierarchy — can be manipulated through embarrassment. Gilgamesh pulled the leader's loincloth and it fell prone.",tactics:["Operate on a dusk-to-night raiding schedule — predictable","Have pride — can be baited or embarrassed","Regenerative biology — the jet-black dagger grew inside one for long enough for flesh to form around it"]},{name:"Swamp Alligators",status:"Encountered",threat:"High in water",desc:"Pale green, large (12-15 feet), presumably corrupted. Dangerous in water. There was a boat. Carl had seen it. Said nothing.",tactics:["Dangerous in water — can grapple and drag under","Drawn to splashing and movement"]},{name:"Maldwin's Zombies",status:"All destroyed",threat:"High in numbers",desc:"Reanimated humanoids with glowing green eyes. Silent movement. The wardrobe may have held over a thousand. All dropped when Dudo carved the ceiling node free.",tactics:["Silent — no warning sounds","Emerge from the wardrobe in waves — keep it shut","Mayo shutting the wardrobe in Session 15 was the most consequential single action of the arc"]},{name:"Unknown Large Creatures",status:"ACTIVE - Session 18",threat:"High - active threat",desc:"Two large creatures approached the mountain camp at 2-3 AM. Tyr fired a flaming arrow blind and hit one for 20 damage. It yelped but did not retreat. Session 18 opens mid-initiative.",tactics:["Large creatures — significant HP and damage output","One already hit for 20 damage and still advancing","Two of them — splitting party attention","Mountain terrain at night, no fire"]},{name:"Giant Bat Creatures",status:"Observed only",threat:"Unknown",desc:"Large bat-like creatures observed flying north in formation, carrying humanoid corpses. Tyr's lore check: 9 — completely outside his knowledge base. Significant.",tactics:["Unknown — only observed from distance","Carrying humanoid corpses heading north","Borin also pinged orcs within 3 miles at the same camp — connection unknown"]}];
  if (detail) {
    const b = BEST.find(x => x.name === detail);
    if (b) {
      const p = el('div', {cls:'page'});
      const inner = el('div', {style:'padding:0 16px'});
      inner.appendChild(back('Bestiary', () => navigate('bestiary')));
      inner.innerHTML += `<div style="font-family:Cinzel,serif;font-size:18px;color:#e6cc84;margin-bottom:4px">${b.name}</div><div style="color:#8b2828;font-size:12px;margin-bottom:12px">Threat: ${b.threat} | ${b.status}</div>`;
      const dc = el('div', {cls:'card', style:'margin-bottom:12px'});
      dc.innerHTML = `<p style="font-size:15px;line-height:1.7">${b.desc}</p>`;
      inner.appendChild(dc);
      inner.appendChild(coll('COMBAT NOTES', b.tactics, true));
      p.appendChild(inner);

    c.innerHTML = `<div style="font-family:Cinzel,serif;font-size:14px;color:#e6cc84">${b.name}</div><div style="color:#9a8a6a;font-size:12px">${b.status}</div>`;
    c.onclick = () => navigate('bestiary', b.name);

// ── PAGE: FACTIONS ────────────────────────────────────────────
function renderFactions() {
  const FACS=[{name:"Rangers of the North",align:"Allied",desc:"The Dunedain — hidden guardians of Eriador protecting people from threats they don't know exist.",rel:"Tyr is a Ranger. Halvar fought alongside the party. Aragorn files reports on Tyr to Elrond.",members:["Tyr (traveling with party)","Halvar Greycloak (Commander, Grey Watch Hollow)","Aragorn (mentioned — not yet encountered)"]},{name:"Red Claw Orc Clan",align:"Hostile - Destroyed",desc:"Received written Black Speech orders — they were an instrument of something larger, not an independent force.",rel:"The party's primary antagonist for the first half of the campaign. The commander above them has not been identified.",members:["The Chieftain (killed by Dudo — Session 4)","The Farmstead Chieftain (killed by Tyr — Session 7)"]},{name:"Rivendell",align:"Allied",desc:"Both a sanctuary and an intelligence hub. Elrond was already tracking the party through Ranger reports before they arrived.",rel:"The party's mission-giver. The healing pool cleared everything they carried. Elrond chose this party specifically.",members:["Elrond Half-elven (Lord of Rivendell)","Aragorn (mentioned)","Gandalf (assembling for council)","Saruman (assembling for council)"]},{name:"Eli's Organization",align:"Hostile - Active",desc:"A covert intelligence network with prepared wilderness facilities, cursed attunement technology, and an unknown boss.",rel:"The party's most dangerous current enemy. Eli has the Black Speech booklet. His boss has not been identified.",members:["Eli the Tinker (field operative — at large)","The Boss (unknown)","Six bandit operatives (all killed by Beorn)"]},{name:"The Enemy",align:"Hostile - Distant",desc:"Sauron's lingering influence through Dol Guldur. Possesses at least one Palantir and has been using it.",rel:"The party does not fully know who is behind what they've faced. The Red Claw orcs, Eli's network, and Maldwin's seed may all connect upward.",members:["Unknown — the command structure above Eli and // ── PAGE: TIMELINE ────────────────────────────────────────────
function renderTimeline() {
  const TL=[{date:"Late October, Day 1",s:"1-2",event:"Annual hunt at the Chetwood Ruins. Ring of Mending and Horn found. Someone yelled Echo — orc chase. Party splits."},{date:"Days 2-3 (the 27th)",s:"3-4",event:"Night march. Intercepted message: attack moved to the 27th. Battle of Bree — ~175 orcs killed. Borin negotiates 2,000 gold. Mungo missing."},{date:"Day 4 (the 28th)",s:"5",event:"Mungo returns. Beorn revealed as the Vanisher. Destination: Rivendell."},{date:"Days 5-7",s:"6-7",event:"Road east. Leah found. Farmstead battle: Dudo burns it, Mungo kills silently, Tyr throws his sword, Mayo saves the barn."},{date:"Day 7 (parallel arc)",s:"9.1",event:"Borin carries Leah to the Weavers. She falls asleep on his shoulders. He waves until out of sight. Then runs."},{date:"Days 7-8",s:"8-9.2",event:"Troll cave. FUCK YOU! Borin hides behind a dead cow. Three trolls killed. Level 4."},{date:"Days 8-9",s:"10.2",event:"Horn dispute — Carl breaks Dudo's kneecap. Ravine ambush. Carl's liver wound. Eli appears."},{date:"Days 9-10",s:"11",event:"Eli revealed. Poisoned mead. Captured. Join or die. Beorn kills all six bandits alone. Eli escapes with the booklet."},{date:"Days 10-12",s:"12",event:"Corrupted wolves (do not burn). The healing pool at Rivendell clears everything."},{date:"Days 12-13",s:"13",event:"Elrond: Palantir mission given. Tyr gets the key ring. Drinking contest. Sacrificial village — Tom drawn and sacrificed. Salted pork escape."},{date:"Days 13-14",s:"14",event:"Swamp. Alligator ambush. Dead Marshes. Ben joins. Carl serves as alligator bait."},{date:"Day 14",s:"15",event:"The Stump. Ben charges Maldwin — killed. Two-phase boss fight. Mungo's blind killing throw."},{date:"Days 14-15",s:"16",event:"Zombie wave. Friendly fire — 0 HP from Dudo's sword. All zombies drop. Iron of Death found. Level up."},{date:"Day 15",s:"17",event:"THE BOAT. Borin nearly drowns. Mountain ascent. Bat creatures. Orc ping. Unknown creatures at camp. Session 18 opens mid-initiative."}];
  const p = el('div', {cls:'page'});
  p.innerHTML = '<div class="ph"><h1>Timeline</h1><p>Every in-game date and what happened</p></div>';
  const inner = el('div', {style:'padding:0 16px'});
  TL.forEach((t, i) => {
    const r = el('div', {style:'display:flex;gap:12px;margin-bottom:16px;align-items:flex-start'});
    r.innerHTML = `<div style="min-width:4px;width:4px;background:${i===TL.length-1?'#8b2828':'#7a6030'};align-self:stretch;border-radius:2px;margin-top:4px;flex-shrink:0"></div><div><div style="font-family:Cinzel,serif;font-size:11px;color:#7a6030;margin-bottom:2px">${t.date}</div><div style="font-family:Cinzel,serif;font-size:10px;color:#5a4e38;margin-bottom:5px">Session ${t.s}</div><div style="font-size:15px;line-height:1.65;color:${i===TL.length-1?'#e6cc84':'#ede3cc'}">${t.event}</div></div>`;
    inner.appendChild(r);
  });
  p.appendChild(inner);
  return p;
}

// ── PAGE: STATS ───────────────────────────────────────────────
function renderStats() {

  const inner = el('div', {style:'padding:0 16px'});
  // Overview grid
  const ovLbl = el('div', {cls:'lbl'}); ovLbl.textContent = 'CAMPAIGN OVERVIEW';
  inner.appendChild(ovLbl);
  const grid = el('div', {cls:'g2', style:'margin-bottom:16px'});
  [['Sessions Played','17'],['Sessions Recorded','15'],['Orcs Killed','175+'],['Townspeople Lost','~75'],['Trolls Killed','3'],['Party Deaths','0'],['Nat 20s Logged','16+'],['Times at 0 HP','10+']].forEach(([l,v]) => {
    const t = el('div', {cls:'stat-tile'});
    t.innerHTML = `<div class="sl">${l}</div><div class="sv">${v}</div>`;
    grid.appendChild(t);
  });

  // Zero deaths

  nd.innerHTML = '<div style="font-family:Cinzel,serif;font-size:11px;color:#4a8a46;letter-spacing:.1em;margin-bottom:6px">PARTY DEATHS: 0</div><p style="font-size:15px;color:#e6cc84;line-height:1.6">Nobody has permanently died. They have been liver-stabbed, acid-coned, zombie-bitten, and had swords dropped on their necks from the ceiling. They have gone to 0 HP at least ten times combined. Nobody has died.</p>';
  inner.appendChild(nd);
  // Per-player
  const plLbl = el('div', {cls:'lbl'}); plLbl.textContent = 'PER PLAYER BREAKDOWN';
  inner.appendChild(plLbl);
  PLAYER_STATS.forEach(ps => {
    const c = el('div', {cls:'card', style:'margin-bottom:12px'});
    c.innerHTML = `<div style="font-family:Cinzel,serif;font-size:16px;color:#e6cc84;margin-bottom:2px">${ps.name}</div><div style="color:#9a8a6a;font-size:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #383020">${ps.player}</div>`;
    const secs = [['NAT 20s ('+ps.nat20s.length+' recorded)',ps.nat20s,'#c8a44a'],['NAT 1s / Critical Failures',ps.nat1s,'#8b2828'],['Times Dropped to 0 HP',ps.at0,'#8b2828'],['Fun Stats',ps.funstats,'#5a7a9a']];
    secs.forEach(([title, items, col]) => {
      if (!items || !items.length) return;
      const s = el('div', {style:'margin-bottom:10px'});
      s.innerHTML = `<div style="font-family:Cinzel,serif;font-size:10px;color:${col};letter-spacing:.1em;margin-bottom:5px">${title}</div>`;
      items.forEach(item => {
        const r = el('div', {style:'display:flex;gap:8px;margin-bottom:5px;align-items:flex-start'});
        r.innerHTML = `<div style="color:${col};font-size:12px;margin-top:2px;flex-shrink:0">·</div><div style="font-size:14px;line-height:1.55;color:#ede3cc">${item}</div>`;
        s.appendChild(r);
      });
      c.appendChild(s);
    });
    const hb = el('div', {style:'background:#2c2a1e;border-radius:5px;padding:8px 10px;margin-top:4px'});
    hb.innerHTML = `<div style="font-family:Cinzel,serif;font-size:10px;color:#7a6030;letter-spacing:.1em;margin-bottom:3px">BIGGEST RECORDED HIT</div><p style="font-size:14px;color:#9a8a6a;line-height:1.5">${ps.bighit}</p>`;
    c.appendChild(hb);
    inner.appendChild(c);
  });
  p.appendChild(inner);
  return p;
}

// ── PAGE: SUGGESTIONS ─────────────────────────────────────────
function renderSuggestions() {
  let sugs = [];
  try { sugs = JSON.parse(localStorage.getItem('mew-sugs')||'[]'); } catch(e){}
  const p = el('div', {cls:'page'});
  p.innerHTML = '<div class="ph"><h1>Player Suggestions</h1><p>Ideas and feedback for the DM - saves in browser</p></div>';
  const inner = el('div', {style:'padding:0 16px'});
  const form = el('div', {cls:'card', style:'margin-bottom:14px'});
  const nameIn = el('input', {type:'text', style:'width:100%;background:#2c2a1e;border:1px solid #383020;color:#ede3cc;border-radius:5px;padding:8px 10px;font-family:Crimson Text,Georgia,serif;font-size:15px;margin-bottom:8px', placeholder:'Your name (optional)'});
  const textIn = el('textarea'); textIn.placeholder = 'Story ideas, items you want, anything for the DM...';
  const submitBtn = el('button', {cls:'btn', style:'width:100%;background:#7a6030;border:none;color:#0d0b08;padding:11px;border-radius:6px;font-family:Cinzel,serif;font-size:12px;letter-spacing:.06em;margin-top:8px'});
  submitBtn.textContent = 'Submit Suggestion';
  submitBtn.onclick = () => {
    if (!textIn.value.trim()) return;
    sugs.push({text:textIn.value, player:nameIn.value||'Anonymous', date:new Date().toLocaleDateString()});
    try { localStorage.setItem('mew-sugs', JSON.stringify(sugs)); } catch(e){}
    textIn.value = ''; nameIn.value = '';
    document.getElementById('content').innerHTML = '';
    document.getElementById('content').appendChild(renderSuggestions());
  };
  form.appendChild(el('div', {cls:'lbl', style:'margin-top:0'}, 'SUBMIT A SUGGESTION'));
  form.appendChild(nameIn); form.appendChild(textIn); form.appendChild(submitBtn);
  inner.appendChild(form);
  if (!sugs.length) {
    const empty = el('p', {style:'text-align:center;padding:20px 0;color:#5a4e38;font-style:italic'});
    empty.textContent = 'No suggestions yet - be the first.';
    inner.appendChild(empty);
  } else {
    [...sugs].reverse().forEach(s => {
      const c = el('div', {cls:'card'});
      c.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-family:Cinzel,serif;font-size:11px;color:#c8a44a">${s.player}</span><span style="font-family:Cinzel,serif;font-size:10px;color:#5a4e38">${s.date}</span></div><p style="font-size:15px;line-height:1.65">${s.text}</p>`;
      inner.appendChild(c);
    });
  }
  p.appendChild(inner);
  return p;
}

// ── NAVIGATION & RENDER ───────────────────────────────────────
function toggleMore() { more = !more; renderNav(); renderMoreDrawer(); }

function getPageContent() {
  switch(page) {
    case 'home': return renderHome();
    case 'party': return renderParty();
    case 'npcs': return renderNPCs();
    case 'sessions': return renderSessions();
    case 'mysteries': return renderMysteries();
    case 'moments': return renderMoments();
    case 'mustknow': return renderMustKnow();
    case 'items': return renderItems();
    case 'locations': return renderLocations();
    case 'bestiary': return renderBestiary();
    case 'factions': return renderFactions();
    case 'timeline': return renderTimeline();
    case 'stats': return renderStats();
    case 'suggestions': return renderSuggestions();
    default: return renderHome();
  }
}

function renderMoreDrawer() {
  let drawer = document.getElementById('more-drawer');
  let overlay = document.getElementById('more-overlay');
  if (!more) { if(drawer) drawer.remove(); if(overlay) overlay.remove(); return; }
  if (!drawer) {
    overlay = el('div', {id:'more-overlay', cls:'more-overlay'});
    overlay.onclick = () => { more = false; renderNav(); renderMoreDrawer(); };
    drawer = el('div', {id:'more-drawer', cls:'more-drawer'});
    document.getElementById('app').appendChild(overlay);
    document.getElementById('app').appendChild(drawer);
  }
  drawer.innerHTML = '';
  const grid = el('div', {style:'display:grid;grid-template-columns:1fr 1fr;gap:9px'});
  MORE_PAGES.forEach(pg => {
    const b = el('button', {cls:'btn', style:'background:#222018;border:1px solid #383020;color:#e6cc84;padding:11px 10px;border-radius:7px;text-align:left;font-family:Cinzel,serif;font-size:12px;letter-spacing:.05em'});
    b.textContent = pg.label;
    b.onclick = () => navigate(pg.id);
    grid.appendChild(b);
  });
  drawer.appendChild(grid);
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  TABS.forEach(t => {
    const b = el('button', {cls:'nav-btn'+(t.id==='more'?(more?' on':''):(page===t.id&&!more?' on':''))});
    b.innerHTML = `<span class="icon">${t.icon}</span>${t.label}`;
    b.onclick = t.id === 'more' ? toggleMore : () => navigate(t.id);
    nav.appendChild(b);
  });
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.appendChild(getPageContent());
  content.scrollTop = 0;
  renderNav();
  renderMoreDrawer();
}

// ── INIT ──────────────────────────────────────────────────────
try {
  render();
} catch(e) {
  document.body.style.cssText = 'background:#0d0b08;color:#e6cc84;font-family:monospace;padding:20px';
  document.body.innerHTML = '<h2 style="color:#8b2828;margin-bottom:12px">Runtime Error</h2><p><strong>' + e.message + '</strong></p><pre style="color:#9a8a6a;font-size:12px;white-space:pre-wrap">' + e.stack + '</pre>';
}
</script>
