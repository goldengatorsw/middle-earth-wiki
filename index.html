{id:"borin",name:'Borin "The Tall" Ironjaw',player:"Josh",race:"Dwarf",cls:"Warden",emoji:"⚒️",

{id:"mungo",name:"Mungo Grubb",player:"Jesse (DM)",race:"Hobbit",cls:"Treasure Hunter",emoji:"🔪",
tag:"More dangerous than he looks. Much more.",
bio:"Mungo is a cheerful hobbit who used to be a burglar, now calls himself a treasure hunter, and has a personal friendship with Beorn the skin-changer. He eliminated three orcs silently inside a burning farmhouse — kills witnessed only as bodies dropping from windows with no sound of struggle from 200 feet away. He threw a dagger while completely blind, running across the room, on disadvantage, and hit Maldwin in the side of the head for the killing blow of the campaign's biggest fight.",
abilities:[
{n:"Assassination / Silent Kills",d:"Nat 20 kills described in cinematic detail. Regular kills leave no sound of struggle. Mungo disappears from combat and enemies simply stop existing."},
{n:"Multi-Attack",d:"Multiple dagger and short sword attacks per turn."},
{n:"Stealth",d:"Nat 20 stealth recorded multiple times — can vanish mid-combat in full view of the party."},
{n:"Pipe-Weed Proficiency",d:"Spend 1 hour smoking before a long rest to gain 1 point of inspiration (once per long rest, confirmed from Adventures in Middle-Earth)."}
],

"Elven Forest-Green Cloak (+2 stealth)",
"Lembas Bread",
"2 Health Potions (D4+2)"
],
moments:[

{s:"7",t:"While the party fought at the farmstead, Mungo slipped alone into the burning farmhouse. Three orcs dropped from windows. No sound of struggle. Gilgamesh watched from 200 feet with perception 20 and never heard a thing. Two of the kills were Nat 20 jugular stabs. This was the moment the party learned what Mungo actually is."},
{s:"10.2",t:"After Beorn's rescue, lit the briar-patch camp on fire — the dry briars caught fast and burned completely. Yelled FOR CARL! charging up a ravine cliff at the goblin archer that just dropped Carl. Then killed him."},
{s:"15",t:"Was catapulted to the ceiling by Tyr and Borin (strength 24 + 21) — drove his short sword into the ceiling node for 14 damage. All zombies briefly seized. Then: blinded by acid from the ceiling, running across the room, threw a dagger on disadvantage — hit Maldwin in the side of the head for the killing blow. 4 HP remaining when he fell."}
],
funny:[

],

{id:"tyr",name:"Tyr",player:"Gabe",race:"Human",cls:"Ranger of the North (Dunedain)",emoji:"⚔️",
tag:"Elrond knows his name. Aragorn files reports about him. The mountains are his road.",
bio:"Tyr is a Dunedain Ranger — one of the hidden guardians of the north. Elrond had already heard of him through Aragorn before the party arrived at Rivendell. He carries the Iron of Death, a Numenorean greatsword made by his ancestors that somehow ended up in Maldwin's sacrifice pile. He shouted FUCK YOU at three trolls with 40 movement speed and sprinted into the night with 25. He has stated explicitly, in character, that he is going to touch the Palantir.",
abilities:[
{n:"Iron of Death",d:"Numenorean greatsword — bane vs. orcs and trolls (extra damage dice on all hits against those types). Bonus action attack once per turn. Silver blade, blue gem in pommel, Sindarin runes."},
{n:"Reckless Attack",d:"Advantage on all attacks — but enemies get advantage against Tyr in return."},
{n:"Primeval Awareness",d:"Sense the presence of certain creature types nearby."},
{n:"Ranger Tracking and Navigation",d:"Wilderness navigation, tracking, sensing danger. The party's navigator and primary scout."},
{n:"Lore Engine",d:"Tyr has provided the party's most important lore checks. Nat 20 identification of the Iron of Death. Nat 20 identification of the seed pod as corrupted Valinor lineage."}
],
gear:[
"Iron of Death — Numenorean greatsword, bane vs. orcs and trolls, bonus action attack",
"Silver Ring Key — unlocks the Palantir lockbox in Lake Town (given by Elrond personally, over Gilgamesh's objection)",
"Previous Elrond-inscribed sword (+1 to hit) — returns to base stats now that Iron of Death is attuned",
"Javelin",
"Elven Forest-Green Cloak (+2 stealth)",
"Lembas Bread",
"2 Health Potions (D4+2)"
],
moments:[
{s:"3",t:"Led the group on a 15-mile night march through total darkness and intermittent rain to Grey Watch Hollow. Navigated by instinct. Held off multiple orcs simultaneously in the forest road ambush. Identified the flickering light on the horizon as Weathertop from 50 miles away."},
{s:"7-8",t:"At the farmstead: fought the wolf chieftain head-to-head while poisoned, used Reckless Attack to cancel the disadvantage. Killed the Orc Chieftain with a greatsword throw. At the troll cave: was spotted while trying to slip out, shouted FUCK YOU at three trolls with 40 movement speed, and sprinted into the night with 25. They gave chase. Session ended there."},
{s:"13",t:"Elrond said: Tyr, I have heard much about you, and Aragorn gives me high praise of the reports he receives of you. Elrond personally inscribed elvish runes onto Tyr's sword. Was given the silver ring key to the Palantir box over Gilgamesh's vocal objection. His response: For sure gonna touch that Palantir."},
{s:"15",t:"Said genuinely to Maldwin during negotiations: I don't think it was the elves. Real engagement with a tragic villain. Was specifically targeted by Maldwin throughout the boss fight — took the most punishment of any party member. His blood may have been involved in the altar activation — the DM lingered on this moment."},
{s:"16",t:"Climbed onto Mayo's shoulders to attack the ceiling node — Nat 20 and 21 rolled. All zombies seized. Went down when Dudo's sword fell on his neck. Went down again to a zombie at 1 HP. Health potion went down the wrong pipe. Spent the rest of the fight hacking and coughing. Locked arms with Borin and catapulted Mungo to the ceiling (Nat 20 + 4 = 24). Rolled Nat 20 Lore — identified the seed pod as corrupted Valinor lineage. Found the Iron of Death at the bottom of the pile."},
{s:"17.2",t:"Had visible nightmares during the long rest — whimpering, saying No no not again. Given a point of exhaustion for poor sleep. Deflected Mungo's concern in the morning: Just worry about the gators. Navigated the mountain at disadvantage due to exhaustion, rolling badly — the party followed his lead anyway. Found the rocky cove shelter (nature Nat 20). Fired the flaming arrow that hit one of the large creatures for 20 damage. Session ends mid-initiative."}
],
funny:[
"Shouted FUCK YOU at three trolls with 40 movement speed before sprinting into the night with 25 — they gave chase. The session ended there.",
"Had Santa's Little Helper written on his forehead while meditating — walked back to Bree — Finn the blacksmith noticed it. Nobody told Tyr who did it.",
"Beorn called him out: You should have known better. A black obsidian pendant — there is nothing more obvious of a cursed item.",
"Health potion was poured on him by Gilgamesh (Medicine 6 — botched) — went down the wrong pipe; he hacked most of it up but survived; spent the rest of the fight coughing"
],
arc:"Tyr carries the weight of Numenorean heritage. He is the party's navigator, its lore engine, its most decorated fighter. Elrond trusted him with the Palantir key over everyone else's objections. He is going to touch the stone — he said so in character. And whatever happens when he does, Elrond may have calculated it."}
];

"Assigned two rangers to train 20 townsfolk as rooftop archers (Tyr assisted); two rangers trained 30 townsfolk in spear-and-shield line defense; one ranger and Dudo set Rambo-style traps outside the walls",
"Considered the tunneling orc activity unprecedented — orcs had not been near Bree in living Ranger memory",
"The next closest Ranger outpost is approximately 50 miles further east — Halvar's group was the only nearby support",
"After the Battle of Bree: Halvar and his rangers remained in Bree helping with defense and recovery",
"Tyr is also a Ranger of the North — Halvar's world and Tyr's world are connected"
],
relationships:"The party split for maximum coverage specifically because of what Halvar could contribute. He is the most important military ally the party has made in Eriador."},

{id:"graf",name:"Mayor Graf Woodfoot",status:"Alive",role:"Mayor of Bree",emoji:"🏛️",loc:"Bree",first:"Session 3",
desc:"Practical, grateful, and not above paying well for results. Commissioned the party after the Battle of Bree as official ambassadors and hunters. Warned them that larger threats exist in the wider world — he doesn't know what they are, but he has lived long enough to know the orc assault was not a normal thing.",
facts:[
"Paid 2,000 gold to the party — negotiated up by Borin; Graf's first offer was lower",
"Awarded the annual hunt prize to the party: 100 gold + the shortbow Gilgamesh now carries (+6 to hit) + an unused favor (still unclaimed)",
"Provided written authorization for two horses and a wagon from stablemaster Whitman",
"Provided a signed letter of introduction to Elrond with the Woodfoot seal — this letter was delivered to Elrond at Rivendell and was part of why the party was received",
"Warned: the attack was the largest threat Bree has faced in living memory — something larger is moving in the world",
"Bree has an existing understanding with the elves regarding major threats — the nature of this agreement is unspecified",
"The party's favor from Graf has not been used — it represents a political asset in Bree"
],
relationships:"The party's formal employer and commissioner. Borin's negotiation before agreeing to anything was the defining moment of this relationship — Graf respects them as professionals."},

{id:"finn",name:"Finn",status:"Alive",role:"Blacksmith's Assistant, Bree",emoji:"⚒️",loc:"Bree",first:"Session 3",
desc:"A young blacksmith's assistant who was mass-producing basic short swords for Bree's defenders before the battle. He had no combat equipment to offer Borin. He was the first person to notice Santa's Little Helper written on Tyr's forehead when the party returned to Bree — he noticed it, said nothing for a moment, then told someone quietly.",
facts:[
"Could not provide Borin a shield — was only producing basic short swords at scale for civilian defenders",
"Was paired with Dudo during the trap-setting preparations; Dudo suggested Finn upgrade his short sword; Finn agreed to ask his brother",
"First person to notice Santa's Little Helper on Tyr's forehead during the return march — nobody told Tyr who did it",
"Borin developed genuine warmth toward him throughout Session 4 — sees Finn as something like a son-figure mentally",
"Works with his brother at the Bree blacksmith"
],
relationships:"A minor but consistent presence. Borin's connection to him is one of the campaign's quieter emotional threads."},

{id:"barliman",name:"Barliman Butterbur",status:"Alive",role:"Innkeeper, The Prancing Pony",emoji:"🍺",loc:"Bree",first:"Session 5",
desc:"Innkeeper of the Prancing Pony — the social center of Bree and the party's base before the battle. Deeply decent. Deeply shaken by the Battle of Bree. Gave the party surprisingly useful intelligence about the wider world without fully realizing how useful it was.",
facts:[
"Innkeeper of the Prancing Pony in Bree — Carl was at his bar getting drunk and polishing his greataxe before the battle",
"Intel about Rivendell: the elves there are noble but genuinely kind; they understand mortal cultures; some have been in Middle-earth for millennia; they are protectors of the world and repositories of ancient knowledge",
"Intel about Wood Elves: more standoffish and prickish than Rivendell elves",
"Notable observation: even 250-300 orcs at Bree would be a small band by the standards needed to bring down a proper fortress — implying forces exist elsewhere that would dwarf what the party faced",
"Was in shock after the battle — his inn survived but his town did not; approximately 75 townspeople died"
],
relationships:"A source of world knowledge who does not fully understand what he knows. The party should revisit him if they return to Bree."},

{id:"whitman",name:"Whitman",status:"Alive",role:"Stablemaster, Bree",emoji:"🐴",loc:"Bree",first:"Session 5",
desc:"The stablemaster outside the east gate of Bree. Provided the party's horses and wagon on Mayor Graf's written authorization. The horses (Tommy and Timmy — also called Chicken, Nugget, and Carrots by at least one party member, despite there being only two horses) were later sent back to Rivendell's stables on Elrond's advice.",
facts:[
"Operated the stables outside Bree's east gate",
"Provided two horses and a wagon on Mayor Graf's written authorization",
"The horses are currently stabled at Rivendell — sent back on Elrond's advice when the party prepared to cross the Misty Mountains",
"The party naming dispute: officially Tommy and Timmy; Chicken, Nugget, and Carrots was also used (for two horses)"
],
relationships:"Minor practical contact. The horses are his stock, currently at Rivendell."},

{id:"beorn",name:"Beorn",status:"Alive",role:"Skin-changer, Independent Ally",emoji:"🐻",loc:"Unknown — ranges widely east of the Misty Mountains",first:"Session 5 (identity revealed)",
desc:"A being who can shift between human form (a massive ten-foot man with a thick black beard and the strength to lift a stone grate that required multiple men to move) and bear form (glowing red eyes, ungodly huge — one of the most physically powerful creatures the party has encountered). He has been present throughout the campaign longer than the party knew.",
facts:[
"Skin-changer — his bear form has glowing red eyes and is described as ungodly huge; one of the most physically powerful beings the party has encountered",
"Was the Vanisher mystery from Sessions 1-2: his 1.5-foot-diameter footprints took all the party's hunting kills from the Chetwood ruins surface — he was monitoring orc activity in the area",
"Collected Mungo during the Chetwood retreat — not to harm him; to monitor the situation and ensure Mungo's safety",
"Mungo's origin with Beorn: 7 years ago Mungo stumbled onto Beorn's isolated oasis while fleeing merchants he had robbed; attempted to steal from Beorn's barn; was caught in the act; Beorn put him to work as indentured labor to pay off the debt; over that time they became genuine friends; Beorn helped Mungo transition from burglarship to treasure hunting",
"Rescued the party from the briar-patch camp in Session 11: arrived in bear form at night, killed all six bandits alone in the dark, lifted the stone grate off the pit, pulled Mungo out first",
"Warning given to the party: war is brewing in the east on this side of Middle-earth; they must hurry to Rivendell; the intel they carry must reach Elrond without delay",
"Explained the obsidian pendant curse: connection can only be broken by crushing the pendant; only certain smiths can do it; working radius is a couple hundred feet — the party is safe as long as Eli is not near them",
"Called Tyr out specifically: You should have known better. A black obsidian pendant — there is nothing more obvious of a cursed item.",
"Destroyed the second orc wave on the 30th — the wave that was supposed to hit Bree on the original schedule; Bree was not hit again because of Beorn",
"In Tolkien's canon, Beorn lives primarily east of the Misty Mountains near the Carrock; his appearance this far west is a campaign deviation — it suggests the threat is significant enough to draw him out of his territory"
],
relationships:"Mungo's most important non-party relationship. The party's greatest potential asset. His presence this far west is a signal the party has not fully processed."},

{id:"elrond",name:"Elrond Half-elven",status:"Alive",role:"Lord of Rivendell",emoji:"⭐",loc:"Rivendell (Imladris)",first:"Session 13",
desc:"Lord of Rivendell. Ancient, grave, and actively aware of the party before they arrived. He treats the party not as random adventurers who wandered in but as specific people he has been tracking, worth trusting with a mission of real importance. He inscribed a sword. He gave away a key ring over an objection. He assembled a council. He is moving pieces.",
facts:[
"Was already aware of the party before they arrived — Aragorn had been filing reports on Tyr specifically through Ranger channels; Beorn may also have sent word",
"Confirmed the Witch-king is not truly dead — only driven from Dol Guldur; his influence continues through corrupted wildlife across the region",
"Revealed the Palantiri: nine seeing stones made by Feanor at the dawn of the world; three to five are lost; the Enemy possesses at least one and has been using it",
"Elrond placed a Palantir in Bree nearly a century ago — the Red Claw assault on Bree and Eli's operation in Bree were both attempts to locate and retrieve it before Elrond could move it",
"Elrond moved the Bree Palantir to Lake Town before the Enemy could find it — this explains the entire orc assault; the party now understands what they were actually part of",
"Mission: travel to Lake Town (~300 miles northeast) and retrieve the Palantir from under the master's hall before the Enemy can use it or corrupt the master of Lake Town through it",
"Inscribed elvish runes (including his personal signature) into Tyr's sword — now +1 to hit; watched by the party with visible awe",
"Gave Tyr the silver ring key to the Palantir lockbox specifically and deliberately, over Gilgamesh's vocal objection — this was not a casual choice",
"The elves cannot accompany the party — doing so would connect Rivendell officially to the mission, which Elrond cannot allow politically",
"Is assembling a council: Gandalf, Aragorn, and Saruman — within weeks of the party's departure; the situation is serious enough for all three",
"When asked if he was happy: paused; his wife Celebrian sailed west centuries ago after being wounded by orcs; a personal sadness surfaced briefly and was set aside without elaboration",
"His healing pool cleared every ailment, wound, curse, scar, and condition any party member carried — including Tyr's hidden paranoia condition from the obsidian pendants",
"222 years old — incredibly young for an elf; Gilgamesh described as a young elf by Rivendell standards"
],
relationships:"The party's mission-giver and the most powerful figure they have directly interacted with. Chose Tyr specifically for the key ring. His choices about the party have not been explained — they have only been made."},

{id:"leah",name:"Leah",status:"Alive — Safe",role:"Young Survivor",emoji:"🌿",loc:"Weaver Cottage (hills off the East Road)",first:"Session 6 (as Isabel)",
desc:"A young girl approximately 9-10 years old whose entire family was slaughtered by orcs at the farmstead. Found running on the road in a state of shock and terror. Borin carried her on his back for miles when her legs gave out — she fell asleep on his shoulders. She is now permanently with her aunt and uncle. She gave Borin a quiet hug before he left. He waved until out of sight. Then ran.",
facts:[
"Survived the farmstead attack by hiding in the barn loft while playing hide and seek — she was in the loft when the orcs emerged from the tunnel in the barn floor",
"Her older brother walked into the barn doorway just as the orcs came up from below and was cut down immediately — first one killed",
"Heard screams from the main house, did not look back, and ran",
"Called Isabel throughout Session 6 — real name confirmed as Leah in Session 9.1 when Halrick and Eowyn called her by name",
"Confirmed the orc tunnel origin: they came up through a horse stall in the barn floor — corroborating the party's own tunnel discovery in Session 8",
"About two miles into the escort walk, her legs gave out — Borin let her climb onto his back; she fell asleep on his shoulders within thirty minutes",
"At the Weaver cottage: ran to her aunt and uncle calling out; when Borin came around the corner they went defensive; she vouched for him immediately",
"The family spent over an hour sharing grief; Leah was officially welcomed permanently into the Weaver household",
"Gave Borin a quiet hug before he left — he waved until out of sight, then ran back toward the smoke on the horizon",
"Now permanently in the care of her aunt Eowyn and uncle Halrick Weaver"
],
relationships:"Borin's most significant civilian interaction of the campaign. The Weaver household is now a named location on the map that will remember Borin if the party ever returns."},

{id:"halrick-eowyn",name:"Halrick & Eowyn Weaver",status:"Alive",role:"Leah's Aunt and Uncle",emoji:"🏡",loc:"Weaver Cottage (hills off East Road)",first:"Session 9.1",
desc:"Leah's aunt and uncle — Eowyn is the sister of Leah's deceased mother. They moved to the hills so they would never have to use those types of tools again — an unspecified past that has not been elaborated on. They welcomed Leah permanently. Halrick gave Borin a +1 warhammer from his shed as thanks.",
facts:[
"Live approximately 7-8 miles off the East Road in the hills, accessible via a stacked-stone cairn marker at a tree and a steep two-mile path",
"Property signposted The Weavers hung between two trees; grow berries and maintain fruit trees; largely self-sufficient",
"Eowyn is the sister of Leah's deceased mother — she broke down weeping when Borin delivered the news of the family deaths",
"Halrick sat on the front steps in stunned silence; stayed with Borin outside while Eowyn took Leah inside",
"Moved to the hills specifically so they would never have to use those types of tools again — an unspecified past",
"Halrick retrieved a versatile warhammer (+1 to hit and damage, DC 13 special crowd-control ability) from his shed as a thank-you gift for bringing Leah safely; traded for Borin's great club",
"Welcomed Leah permanently into their household during the hour Borin stayed for the meal",
"Have a dog named Rusty"
],
relationships:"A civilian household that now exists permanently on the map. Borin's connection to them is one of the campaign's quieter emotional anchors."},

{id:"eli",name:"Eli the Tinker",status:"HOSTILE — At Large",role:"Enemy Operative",emoji:"⚠️",loc:"Unknown",first:"Session 10.2",
desc:"Presented himself as a helpful traveling tinker who happened to find the party's lost wagon. He was lying about everything from the beginning. He engineered the party's capture through poisoned mead, imprisoned them in a pit, offered a join or die ultimatum, and escaped with the Black Speech booklet before Beorn arrived. He reports to an unknown boss. His organization was searching for the Palantir in Bree — the same thing Elrond moved to Lake Town.",
facts:[
"Appeared after the ravine ambush in Session 10.2 driving the party's wagon — claimed he found it abandoned in a field; had Eli's personal cart towed behind it",
"Distributed obsidian pendant trinkets to party members as good luck charms — these secretly attuned the party to his mental assault power when slept with",
"Arranged poisoned mead through a merchant caravan acting as his front — everyone except Borin and Tyr fell unconscious (Con save 17+ at disadvantage)",
"Commanded six trained bandit operatives who captured and hog-tied the party while they were unconscious",
"Brought the party to a briar-patch camp approximately 10 miles south of the East Road — a prepared facility with a prisoner pit under a stone grate",
"Demonstrated pendant control: snapped his fingers — 10-second jolt; 30-second jolt that dropped Carl to the ground; the party was completely at his mercy",
"The join us or die ultimatum: presented from a makeshift throne with a whole lamb roasting on a spit; described his organization as something the party would want to be part of",
"The party overheard the bandits in the pit: they failed to find a specific item in Bree that the orcs were supposed to help them access by clearing buildings; they would have to report to the boss",
"That item was the Palantir — which Elrond had already moved to Lake Town before they could find it",
"Escaped before Beorn arrived — took the party's wagon, both horses (Tommy and Timmy), and critically the Black Speech booklet; was not among the six bodies Beorn killed",
"The Black Speech booklet is now in his possession — currently in enemy hands since Session 11",
"His organization fits the profile of a covert intelligence network with prepared facilities, front operations, and communication upward to a boss"
],
relationships:"The party's most wanted current enemy. He has the Black Speech booklet. He knows about the Palantir. He has an active boss who has not been identified."},

{id:"maldwin",name:"Maldwin — The Last Sea Warden",status:"DECEASED",role:"Swamp Boss",emoji:"💀",loc:"The Corrupted Stump (destroyed)",first:"Session 15",
desc:"A human who was centuries old — once a healer and a father, destroyed by grief when Dol Guldur's remnants killed his people while the lords of Rivendell counted stars. He walked to Dol Guldur's ruins afterward, found a seed from one of Valinor's Golden Trees in the rubble, planted it in an ancient swamp stump, and for 19 winters fed it blood through a sacrifice pact with a nearby village. His goal: a zombie army large enough to march on Rivendell. Killed by Mungo's blind dagger throw. The party was two days from Rivendell the entire time they were fighting him.",
facts:[
"Self-described: the last sea warden of the true light, keeper of the heart stolen from Valinor",
"Was once a healer and a father; his people were destroyed by the remnants of Dol Guldur while the lords of Rivendell counted stars — he blames the elves",
"Walked to Dol Guldur's ruins after his people died and found a seed from one of Valinor's Golden Trees in the rubble",
"Planted the seed in the ancient tree stump which called to him; for 19 winters fed it blood via the village sacrifice pact — blood for bloom",
"The zombie army in the wardrobe may have numbered over a thousand — aimed at Rivendell, two days away",
"Immediately identified Gilgamesh as an elf and became consumed with rage — he brought one of them here; this confirms elves and this specific corruption have history",
"Offered the party eternal life from the cauldron — he believed he was saving the world, not destroying it",
"Called the Palantir elf witchcraft when the party mentioned it during negotiations",
"Tyr said genuinely during negotiations: I dont think it was the elves. Maldwin heard it. It did not stop him, but he heard it.",
"Phase 2 triggered by Carl's critical hit — absorbed cauldron blood, swelled to Huge size, became partially translucent with visible internal organs",
"Killed by Mungo throwing a dagger while blinded, running, on disadvantage — hit Maldwin in the side of the head; Maldwin had 4 HP remaining when he fell",
"Was likely an instrument rather than the mastermind: someone provided the seed from Dol Guldur; someone brokered the initial village pact; something sent the bats to raid the village after Maldwin died; that entity is still out there"
],
relationships:"The campaign's first true villain — and a tragic one. He was right that his people were destroyed and that no one came to help. He was wrong about everything he did about it."},

{id:"ben",name:"Ben",status:"DECEASED",role:"Civilian Companion",emoji:"💀",loc:"The Stump (deceased)",first:"Session 14",
desc:"19 years old. His brother Tom was the 16-year-old drawn in the village lottery and sacrificed — hog-tied and throat-slit as the night's offering in front of the village while the party watched. Ben followed the party alone into the swamp with a crude bow and 3-4 arrows. When he saw Maldwin, he charged without words and without hesitation. Maldwin killed him instantly. He died doing the only thing he had left to do.",
facts:[
"Brother of Tom — the 16-year-old drawn in the lottery the night before the party left the village",
"Followed the party alone into the swamp rather than asking openly — afraid other villagers would stop him",
"The party investigated him when he appeared from behind a tree (insight 24): he was telling the complete truth about everything",
"He said only: I want to watch him die. I want to be there when he dies.",
"The party voted to let him come along",
"He fired his crude arrows during the opening zombie combat — participated, contributed, did not complain",
"When Maldwin stepped into view: Ben charged instantly — no words, no plan, no hesitation",
"Maldwin killed him with a magical staff blast and corrosive splash before he reached him",
"He was the only person in his village who chose to act rather than endure 19 more winters",
"The party brought him into that fight. He is gone."
],
relationships:"One of the campaign's most important moral weight-bearers. The party chose to bring him. They watched him die. Tom's killer is destroyed. Ben is gone. The village that sacrificed its children for 19 winters has lost the one person who chose to fight back."},

{id:"tyndell",name:"Tyndell",status:"UNKNOWN",role:"Village Leader, Sacrificial Village",emoji:"❓",loc:"Unknown — village raided",first:"Session 13",
desc:"The leader of the unnamed sacrificial village near the Misty Mountains. Confronted by the party the morning after the lottery when they demanded answers. Defended the pact as the only thing keeping the village alive for 19 years. Status unknown after the bat swarm raided the village following Maldwin's death.",
facts:[
"Led the village under the 19-winter sacrifice pact — one person drawn by lottery every night to be offered to the creature",
"Confronted by the party the morning after Tom's sacrifice: defended the arrangement as necessary survival",
"The creature attacked any village that did not provide an offering — the pact was the only thing keeping people alive",
"The village had been entirely self-sufficient for 19 years — completely cut off from the outside world by the pact",
"Tyndell's moral position: complicity in the sacrifice of their own children as the price of everyone else surviving",
"Status unknown after Maldwin's death — the bat swarm that raided the village afterward may have been retaliation or a command structure response"
],
relationships:"A figure the party never fully resolved. They left during the salted pork distraction. He knows they were there."},

{id:"mez",name:"Mez",status:"UNKNOWN",role:"Innkeeper, Sacrificial Village",emoji:"❓",loc:"Unknown — village raided by bats",first:"Session 13",
desc:"Innkeeper of the unnamed sacrificial village. Meek, traumatized, grateful for any kindness. His wife was sacrificed five moons before the party arrived. He pulled the party inside when the creature prowled outside at night.",
facts:[
"Innkeeper of the village under the 19-winter sacrifice pact",
"His wife was sacrificed five moons before the party arrived — relatively recent loss; he was clearly still in grief",
"Pulled the party inside when the creature prowled at night — they heard wet, gurgling, sloshing footsteps and labored breathing outside the inn",
"The creature's nightly prowl was a regular event that the village had learned to survive by staying inside",
"Grateful for the party's presence and kindness — any outside contact was unusual",
"Status unknown after the bat swarm raided the village following Maldwin's death; the party did not return"
],
relationships:"A tragic figure. He fed his wife to the creature to survive. He does not consider himself responsible. He probably is not wrong."},

{id:"bonkey",name:"Bonkey",status:"UNKNOWN",role:"Water-Fetcher, Sacrificial Village",emoji:"❓",loc:"Unknown — village raided by bats",first:"Session 13",
desc:"An older man (appears to be in his 60s) assigned as the only villager permitted to go outside — his job was to fetch water from the stream. Found by the party shaking and muttering at a stream in the early morning. Wore a small iron medallion shaped like an open mouth. His presence led the party unknowingly to the village.",
facts:[
"The only villager permitted to leave the village perimeter — his role was to fetch water from the nearby stream",
"Found by the party at the stream: hands shaking, glancing back over his shoulder into the dark forest, muttering: Just gotta make it through another night. Just one more night.",
"His assignment as the water-fetcher was presumably because he was old enough that his loss would be less devastating to the village's survival",
"Wore a small iron medallion shaped like an open mouth — significance unknown; may be connected to the sacrifice pact or creature",
"His presence at the stream led the party directly to the village — he did not intend this",
"Status unknown after the bat raid"
],
relationships:"The iron open-mouth medallion has never been explained. Whether it is significant or simply a trinket is unknown."},

{id:"aethon",name:"Amannë",status:"Alive",role:"Elven Attendant, Rivendell",emoji:"✨",loc:"Rivendell",first:"Session 12",
desc:"An elven attendant at Rivendell who received the party at the valley entrance and escorted them to the bathing chamber. Graceful, formal, and precise. An original Rivendell NPC — not from Tolkien's canon.",
facts:[
"Received the party at the Rivendell valley entrance with two other guards",
"Escorted the party through cliffside paths carved into the rock to the bathing chamber",
"Explained the healing pool and left the party to bathe — departed immediately so as not to intrude",
"Arranged for the silver-gray elven robes the party wore after bathing",
"Returned to escort the party to Elrond's grand hall when he was ready to receive them"
],
relationships:"A minor contact but the party's first direct elvish interaction at Rivendell."}
];


const SESSIONS=[
{num:"1-2",title:"The Beginning",date:"Late October, Day 1",summary:"Annual hunt at the Prancing Pony. The Chetwood Ruins investigated. Orc tunnel network discovered underground. Ring of Mending retrieved from a pool. Horn of the Ruins found. Someone yelled Echo into the abyss — hundreds of orcs gave chase. Carl nearly dragged underground. The party escaped. All hunting kills had vanished from the surface — giant footprints. NOW KNOWN: Beorn. Party split: Borin/Mayo/Mungo west to warn Bree; Tyr/Carl/Gilgamesh/Dudo east to Grey Watch Hollow.",
events:[
"Annual hunt assembled at the Prancing Pony — prizes of weapons and coin; the event that put the party together",
"The Chetwood Ruins investigated: looted orc bodies, found a riddle on a note, solved puzzles involving stone carvings",
"A trapped box blinded one character for an hour",
"Cellar doors breached through improvised methods including pile driving and throwing people",
"Descended underground, navigated a passage, fell into pits, reached a large circular chamber",
"Ring of Mending retrieved from a pool — it slammed down before Carl took it. NOW KNOWN: this is Gilgamesh's Ring of Mending",
"Someone yelled Echo into the abyss for fun — hundreds of orcs immediately gave chase",
"Carl was nearly dragged back underground by orcs grabbing his legs — survived barely",
"Party escaped, locked and trapped the orcs below the cellar",
"Horn of the Ruins found in a surface room and taken by Carl",
"Back on the surface: all hunting kills had vanished (pigs, vulture, wolves) with no blood trail — only giant 1.5-foot-diameter footprints. NOW KNOWN: Beorn, who was monitoring orc activity in the Chetwood",
"Party split for maximum coverage: Borin/Mayo/Mungo west to warn Bree; Tyr/Carl/Gilgamesh/Dudo east to Grey Watch Hollow"
]},
{num:"3",title:"The Night March",date:"Days 2-3",summary:"Tyr led a 15-mile night march through the Chetwood to Grey Watch Hollow. Two combats en route. Halvar Greycloak marched 5 rangers to Bree. Arrived to find Mungo missing.",
events:[
"Party departed the Chetwood ruins eastward at dusk; Tyr navigated in near-total darkness",
"Massive fallen oak blocked the path — 45 minutes of chopping to bypass; Gilgamesh took a level of exhaustion and got poison oak on his face",
"COMBAT 1 — Forest Road Orc Ambush: Four orcs bearing red claw tattoos were ambushed carrying a message north",
"Dudo scored a Nat 20 Sneak Attack — short sword up through an orc's groin; the orc died screaming",
"Carl delivered the killing blow — a beheading; the head landed on the axe hilt; he took the head as evidence",
"Intercepted message (broken Common Orcish): The hideout has been found — attack must be sooner — the 27th",
"The attack was previously planned for the 30th — this message was moving it up; party wondered if the second force still planned to attack on the 30th",
"COMBAT 2 — Wolf Pack at camp: Six wolves + chieftain attacked at ~1am; Dudo shot himself with a Nat 1 and fell from his tree",
"Dudo jumped from the tree onto a wolf's back and stabbed it through the neck on the way down",
"Gilgamesh fired a glowing green arrow through a wolf's neck — spectacular kill",
"Wolf chieftain survived with 2 HP and fled",
"Dudo wrote Santa's Little Helper on Tyr's forehead while he meditated (Sleight of Hand: success) — nobody told Tyr",
"Party arrived at Grey Watch Hollow ~3am; met Halvar Greycloak; delivered the intercepted message",
"Halvar: orcs tunneling under the Ranger boundaries was unprecedented in living memory; decided to march to Bree at dawn with all five rangers",
"Long rest at Grey Watch Hollow (3am-9am); Tyr woke to discover the forehead writing; nobody explained it",
"Marched back to Bree with 7 Rangers total — unprecedented; the sight immediately boosted morale across the town",
"Arrived to find Bree in full defensive preparation — and to learn that Mungo Grubb had gone missing; his tracks simply stopped, no blood, no body"
]},
{num:"4",title:"The Battle of Bree",date:"Day 3 (the 27th)",summary:"Pre-battle preparation. Gilgamesh built a Nat 20 sniper nest. Carl wept at Mungo's disappearance site. ~250-300 orcs attacked at sunset. Traps took ~50 on approach. Gilgamesh's barrel explosion destroyed the gate. Two waves of fighting. ~175 orcs killed; ~75 townspeople dead. Borin negotiated 2,000 gold afterward.",
events:[
"Morning: Carl was drunk and polishing his greataxe at the Prancing Pony, monologuing about Mungo's potential to the barkeep; carelessly swinging the axe around",
"Borin spent the afternoon trying to find a usable shield from any townsperson — nobody in Bree had combat equipment; he ultimately stripped his equipped shield to use his great axe and lost his Protection feature",
"Gilgamesh built a camouflaged sniper nest on the mayor's three-story roof (Nature 21 for vines); after the battle he painted it Nat 20 so it permanently looks like part of the building architecture",
"Carl blew the Horn of the Ruins at Mungo's disappearance site (performance — used his last inspiration): the horn revealed only the surrounding terrain; Carl began to cry while blowing it and held the note as long as he could",
"Carl: I didn't see anything, guys. I gave it my best shot.",
"Pre-battle scout: Borin heard clanking near the Chetwood ruins and helped scare off whatever was there",
"At sunset: orc torchlight visible in the tree line — two formations of ~100+ each; horns blared; full sprint toward town",
"Traps set by Dudo and the Rangers took approximately 50 orcs on approach (spears, pit traps with spikes and excrement)",
"Gate explosion: Gilgamesh threw a cooking fuel barrel off the roof and dropped a torch — gate destroyed + 15-20 orcs killed simultaneously; Gilgamesh was thrown by the explosion, fell with the gate, took 1 damage",
"Borin on the walkway: caught a falling defender, assessed the wound, twisted the arrow to end his suffering as the battering ram struck below",
"Carl in the main street: decapitated an orc and dedicated the kill to Mungo — Thats for Mungo, bitch!",
"Carl dropped to approximately 6-8 HP — nearly died; used Defiance to heal himself mid-battle",
"Five elite orc warriors + the chieftain broke through the burning gate — all six killed by the party",
"Dudo landed the killing blow on the orc chieftain (stealth 19 — shot through the liver; second arrow through the second liver finished him)",
"Approximately 50 orcs fled into the woods; ~175 total killed; ~75 townspeople dead",
"Borin negotiated the party's payment from Mayor Graf before agreeing to anything: 2,000 gold + finesse shield + horses + wagon",
"Mayor Graf also awarded the annual hunt prize: 100 gold + the shortbow Gilgamesh now carries (+6 to hit) + an unused favor"
]},
{num:"5",title:"Morning After / Mungo Returns",date:"Day 4 (the 28th)",summary:"Mungo returned alive. Revealed as taken by Beorn — a skin-changer he had met 7 years ago. The Vanisher mystery solved. Party destination confirmed: Rivendell, ~150 miles east.",
events:[
"Mayor Graf's morning meeting — the party's commission formalized; they are now ambassadors and hunters with a letter bearing the Woodfoot seal",
"Mungo returned to the group: had been taken by Beorn during the Chetwood retreat — not harmed",
"Beorn revealed as the Vanisher: a skin-changer able to take the form of a massive bear; Beorn had taken all the hunting kills from Sessions 1-2",
"Mungo's backstory begins: former burglar, got caught stealing from a merchant caravan, was chased for miles, got completely lost, nearly starved, stumbled onto Beorn's isolated oasis, attempted to steal from the barn",
"Beorn caught Mungo in the act — in human form — and put him to work as indentured labor to pay off the debt; over that time they became genuine friends",
"Beorn helped Mungo transition from burglarship to treasure hunting — Mungo still steals, but now only from ruins and forgotten caches that don't belong to anyone",
"Party destination confirmed: Rivendell, approximately 150 miles east, bearing Mayor Graf's letter of introduction to Elrond",
"Pipe-weed proficiency confirmed: 1 hour smoking before a long rest = 1 inspiration point (once per long rest, from Adventures in Middle-Earth rulebook p.156)",
"Season confirmed: late October — fall/early winter; this was the annual hunt's season"
]},
{num:"6",title:"The Road East",date:"Days 5-6",summary:"Travel east on the wagon in a severe storm. Dudo skied off the wagon on a cooking pan. Smoke plume investigated — lightning fire red herring. Leah found on the road — family slaughtered by orcs. Borin separated to escort her. The rest charged the farmstead. Combat begins.",
events:[
"Departed Bree on the 28th heading east on the East Road; Mayo and Mungo taking driving shifts",
"Severe storm incoming — raced to cover ground; wagon maximum safe speed confirmed as 12 mph (higher risks structural damage)",
"Dudo tied a rope to the wagon and himself, grabbed a cooking pan, and skied off the back at full speed — achieved graceful full-speed muddy road skiing (acrobatics success)",
"Smoke plume spotted 8-10 miles out; Dudo (Wisdom 23) intuitively confirmed orcs were probably nearby — sixth sense for orc behavior",
"Investigation: 1-mile climb up a 20-foot cliff (Dudo anchored the rope with an arrow, attack roll 24; climbed with roll 30; reinforced the rope for the others)",
"The smoke source: a lightning-struck wildfire — a red herring; orc tracks on the road confirmed they had continued east without stopping",
"Horn of the Ruins blown at altitude (performance 12) — revealed mineral content of the surrounding rock (limestone, quartz, gemstones) but no orcs in range",
"Carl identified from the thinning orc tracks that the survivors had settled nearby — the party was close",
"Leah (called Isabel throughout this session — name corrected to Leah in Session 9.1) found running around a corner: sobbing, in shock, her whole family killed at the farmstead by orcs",
"Carl suggested Borin escort her; Borin agreed without argument — the unglamorous but essential duty",
"Tyr immediately sprinted toward the farmstead the moment the decision was made",
"Dudo jumped off the moving wagon mid-approach (acrobatics 15 + inspiration) and moved through trees to flank independently",
"Both horses hit by arrows from farmstead windows; Gilgamesh and Mayo on the wagon as combat began at approximately 320 feet",
"Session cliffhanger: combat initiated; Borin and Leah separated; rest of party in multi-front approach"
]},
{num:"7",title:"The Farmstead Battle",date:"Day 7",summary:"Multi-front battle at the occupied farmstead. Dudo burned the building with fire arrows. Mungo silently killed three orcs inside. Tyr killed the Chieftain with a greatsword throw. Mayo saved the barn. Black Speech booklet recovered. Orc tunnels found beneath the barn.",
events:[
"Dudo flanked through the tree line; used tinderbox to light an arrow (Sleight of Hand 23); began shooting fire arrows at the farmhouse windows",
"Second floor caught fire and spread upward — the building was now burning from inside",
"Mungo slipped alone into the burning farmhouse through a first-floor window; three orcs dropped from windows with no sound of struggle",
"Gilgamesh watched from 200 feet with perception 20 and never heard a thing — this was the moment the party learned what Mungo actually is",
"Wolf-riders emerged from the barn area — multi-front combat requiring the party to split attention",
"Mayo ran into melee alongside Tyr in a shield-bearer formation — Mayo in front with shield raised, Tyr behind with a flaming spear providing cover against window archers",
"Mayo tried to tame the large wolf three separate times (animal handling 18 each time) — wolf refused; it was an evil creature that had just feasted on the farmstead family",
"Mayo went down to a wolf bite (dirty 20 hit, 11 damage, dropped to 0 HP); Ring of Mending used to instantly revive (1 HP); Mayo used Surge of Vigor and kept fighting",
"Tyr killed the Orc Chieftain with a greatsword throw",
"The farmhouse burned to its stone walls — no roof, no interior, only stone standing approximately 10 feet high",
"After combat: Mayo pumped the artesian well and doused the barn repeatedly with buckets — the barn was saved",
"Black Speech booklet found in a hidden pouch inside the Chieftain's leather jacket — first written evidence of organized orc command in the language of Mordor",
"Dudo looted the third-floor orc archer: found 7 poison arrows; Mungo found 7 more from second-floor bodies; Dudo now carries 21 total poison arrows",
"Beneath the barn floor: a trap door in a horse stall leads east through orc tunnels — confirmed same tunnel Leah described orcs emerging from"
]},
{num:"8",title:"Into the Hill",date:"Days 7-8",summary:"The locked barn shed breached — wine barrels and pipe weed found. Horn revealed the tunnel system. The party followed tunnels east to a large troll cave. Tyr spotted by returning trolls. Shouted FUCK YOU at three trolls and sprinted into the night with them in pursuit.",
events:[
"Locked barn shed breached: approximately 20 large wine barrels (~50 gallons each), smaller barrels, farm ledgers, pipe weed, quill and ink",
"Gilgamesh investigated the wine barrel — failed Constitution save — got noticeably buzzed; Tyr's arrow then punctured the barrel; improvised cooking-pot catchment system to save the wine",
"Horn of the Ruins blown into the trap door opening: 3D echolocation map revealed the tunnel system below; party confirmed this was one of the X-marked locations from the Black Speech booklet maps",
"Party descended into the orc tunnels beneath the barn floor",
"Tyr wrote his will in ink while walking through the tunnel",
"The party hotboxed the tunnel with pipe weed from the barn shed during the traverse",
"The horse names dispute: officially Tommy and Timmy; at least one party member used Chicken, Nugget, and Carrots (there are only two horses)",
"The cave at the tunnel's end: approximately 15-foot vine-curtained opening; large chamber beyond — a troll lair",
"Trolls returned from raiding at dusk while the party was still inside investigating",
"Tyr attempted to slip out past the returning trolls — was spotted",
"Shouted FUCK YOU at three trolls (his movement speed: 40) — then sprinted into the night (his actual speed: 25)",
"Session cliffhanger: three trolls in pursuit of Tyr in the dark; the party still inside the cave"
]},
{num:"9.1",title:"Borin Escorts Leah — The Walk to the Weavers",date:"Day 7 (parallel arc)",summary:"Borin's solo escort arc played in full. All roleplay, no combat. Carried Leah on his back until she fell asleep on his shoulders. Delivered her safely to the Weaver cottage. Stayed an hour with the grieving family. Rolled a dirty 20 at dusk and saw smoke on the horizon.",
events:[
"Borin and Leah set off from the party split point; she cycled between sobbing and whimpering",
"Leah confirmed: orcs came up through a tunnel in one of the horse stalls while she was hiding in the barn loft; her older brother walked into the barn doorway and was cut down immediately; she heard screams from the house and ran",
"About two miles in: Leah's legs gave out; she asked Borin to carry her; he let her climb on his back — she fell asleep on his shoulders within thirty minutes; he carried her the rest of the way",
"Borin made a terrible dad joke about the uncle's cottage sounding like a cave — she gave him a half-hearted laugh; it was enough",
"Found the stacked-stone trail marker (perception 11 with advantage from Warden terrain); the offshoot path climbed steeply up a large hill for approximately two miles",
"Arrived at the Weaver cottage (sign: The Weavers, hung between two trees); dog Rusty ran out first; Eowyn and Halrick emerged",
"Leah ran to them; they greeted her with confusion; when Borin came around the corner they went immediately defensive (Did he hurt you?); Leah vouched for him",
"Borin set down his greataxe to show he was not a threat",
"Delivered news of the family deaths carefully and with decency; Halrick sat on the front steps in stunned silence; Eowyn — Leah's mother's sister — broke down weeping",
"Stayed inside for over an hour sharing grief with the family; Leah officially welcomed permanently into the Weaver household",
"Charisma roll of 16 attempted for comfort — DC too high; her whole family just died",
"Stepped outside when the grief became too much — his own wife and children were suddenly on his mind; orcs are not supposed to be in places like this",
"Perception check dirty 20 at approximately 5pm: thick column of smoke rising from approximately 10-12 miles away in the direction the party had gone",
"Session ends on that image — Borin alone at dusk, watching something burn on the horizon"
]},
{num:"9.2",title:"The Troll Fight / Borin Returns",date:"Days 7-8",summary:"Borin's harrowing solo return through the storm. Three trolls killed in the cave. Jet-black dagger found inside a troll's thigh. Halrick gifted Borin a +1 warhammer. Party leveled up to Level 4.",
events:[
"Halrick retrieved a versatile warhammer from his shed as a thank-you gift for Borin bringing Leah safely; Borin traded his great club for it",
"Leah gave Borin a quiet hug before he left; he walked to the property edge waving until out of sight; then ran",
"Caught in a severe thunderstorm; sheltered under a rock outcropping; fashioned a large palm-leaf rain hat and named it Leafster",
"Arrived at the farmstead clearing: house burned to stone walls; clearing strewn with mutilated livestock and a decapitated woman's body; three trolls (15-foot leader + two 14-foot subordinates) loading corpses and loot",
"Hid behind a dead cow lying flat — 20 feet from the trolls — completely still",
"Nearly discovered twice; one troll thought he saw something; the leader overruled him",
"Borin went to stand up during a lightning flash — flinched — dropped the warhammer on his foot — involuntary grunt — the trolls heard it and looked back",
"Sprinted into the treeline (stealth 12); trolls gave brief chase to the tree line then decided against pursuing; Borin urinated on himself; noted it was actually warm and somewhat comforting given how cold and wet he was",
"Broke the barn lock by timing hammer blows to thunder (athletics 24); found the tunnel but had no torch and was alone — decided to follow the troll tracks instead",
"Tracked broken branches through dark forest; heard troll arguing ahead; waited for them to fade; continued carefully",
"Arrived at the cave entrance just as Mayo burst through the vines — initiative called",
"TROLL FIGHT: All three trolls killed; key moments: Gilgamesh pulled the big troll's loincloth (it fell prone); Mungo scored Nat 20 + Nat 19 (Keen) for 45 damage killing one troll; Borin delivered the killing blow on the one that had spotted him in the field — cut it nearly in half, emerged covered in intestines",
"Jet-black dagger found inside one of the troll's thighs — the body had grown flesh around it; blade approximately 4-5 inches, no runes, unknown make; perfectly sized for a halfling",
"Party leveled up to Level 4"
]},
{num:"10.2",title:"The Long Night After",date:"Days 8-9",summary:"Horn of the Ruins conflict exploded — Carl knocked Dudo unconscious and broke his kneecap. Carl sent to the barn. Borin forced reconciliation. Eli the Tinker appeared with the recovered wagon. Ravine ambush — Carl's liver wound. Two days from the bridge to Rivendell.",
events:[
"Morning chaos: Dudo tried to blow the Horn of the Ruins; Carl grabbed it back; Mungo swung at Carl's legs; Dudo caught Mungo's arm; escalating chaos",
"Borin slammed Horic's Iron Hand Fang into the ground — DC 13 knockdown triggered; Carl and Dudo went prone; Gilgamesh was mid-urination and soaked himself",
"Carl's greataxe accidentally swung and knocked Dudo unconscious; Dudo fell backward onto a rock and broke his kneecap (8-day injury — movement halved, disadvantage on mobility checks)",
"Borin picked up Mungo and threw him at Gilgamesh (caught him like a torpedo under the armpits); then physically placed Carl and Dudo facing each other and tilted them until they made eye contact",
"Forced handshakes; reconciliation achieved; Carl sent to the barn for the morning to cool down",
"Mungo sanitized a wound by dipping his finger in his health potion — the potion turned from gold to nasty yellow; now a contaminated mystery item",
"Tracked the missing wagon east; a second axle track was observed (Eli's smaller personal cart being towed behind)",
"Ravine ambush at near-sunset: 5 orcs from each side + goblin archers at the top of the ravine firing poison arrows",
"Carl went to 0 HP — stabbed through the liver; liver wound condition: poisoned for 2 days, cannot drink alcohol (the irony was noted)",
"Gilgamesh used Ring of Mending to revive Carl to 1 HP; Carl immediately got up and hit the orc that dropped him",
"Mungo charged up the ravine cliff at the goblin archer yelling FOR CARL! — then killed him",
"Party looted the ravine orcs; continued east tracking the wagon",
"Eli the Tinker appeared around the corner driving the party's wagon — claimed he had found it abandoned in a field; presented himself as a helpful tinker; offered them a ride"
]},
{num:"11",title:"The Tinker's Teeth",date:"Days 9-10",summary:"Eli's true nature revealed. Obsidian pendants were cursed attunement devices. Poisoned mead. The entire party captured and imprisoned in a pit. Join or die ultimatum from a makeshift throne. Beorn arrived in the night, killed all six bandits alone in the dark. Eli escaped with the Black Speech booklet.",
events:[
"Eli led the party to an ancient circular ruin for shelter; distributed obsidian pendant trinkets as good luck charms — secretly these were cursed attunement devices",
"Party slept with pendants on or nearby — became attuned to Eli's mental assault power",
"Next day traveling east: encounter with a merchant caravan (3 wagons, ~6 people); they offered mead",
"Borin and Tyr resisted the mead (Constitution save 17+ at disadvantage); everyone else fell unconscious one by one including Carl who was driving the wagon",
"Carl slumped over and fell onto Borin; Borin grabbed the reins while Carl collapsed on him",
"Six bandit horsemen rode up and surrounded the wagon — Eli's operatives; Borin and Tyr were the only conscious fighters (2 vs 6)",
"Borin took 24 total damage across multiple rounds before going down; Tyr fought alongside; both eventually hog-tied",
"Woke in the party's own wagon as prisoners — off the main road; landscape unfamiliar; briar patches and zigzagging terrain",
"Borin recognized Eli's voice: come on it's just right around this corner — confirming Eli directed the bandits from the beginning",
"Brought to a large briar-patch camp: ~5,000 square feet cleared inside a 15-foot briar maze; thrown into a pit approximately 7-8 feet deep under a stone grate requiring multiple people to move; all weapons removed",
"While in the pit: overheard bandits discussing their failure at Bree; they were supposed to find a specific item in Bree (the Palantir); the orcs were supposed to help by clearing buildings; they would have to report to the boss",
"Eli brought them out of the pit: makeshift throne, whole lamb roasting on a spit, join us or die ultimatum",
"Eli demonstrated pendant control: snapped his fingers — Carl's eyes rolled back; 10-second jolt; then 30-second jolt that dropped Carl to the ground (Carl had been verbally provoking Eli repeatedly and earned each pulse)",
"Carl's verbal provocations while imprisoned: called his captor a pussy mid-imprisonment; earned multiple spear pokes in the calf; continued being provocative until knocked unconscious by repeated punches",
"Party returned to pit to think over options; took a full long rest in the pit (Tyr at 1 HP recovered fully)",
"Night: Beorn arrived in bear form — glowing red eyes, ungodly huge; roaring; screaming; silence; sniffing; red eyes appearing at the grate; lifted the stone; pulled Mungo out first",
"Mungo ran and threw a knife and ladder down for the rest; everyone freed",
"Beorn shifted to human form (massive 10-foot man): warned the party — war is brewing in the east on this side of Middle-earth; they must hurry to Rivendell; the intel they carry must reach Elrond immediately",
"Beorn explained the obsidian pendant curse: connection can only be broken by crushing the pendant; only certain smiths can do it; working radius is a couple hundred feet so the party is safe as long as Eli is not near them",
"Beorn called Tyr out specifically: You should have known better. A black obsidian pendant — there is nothing more obvious of a cursed item.",
"Beorn departed in bear form; Mungo immediately lit the briar-patch camp on fire — the dry briars caught fast and burned completely",
"Eli was NOT among the six bodies — escaped before or during Beorn's attack; took the Black Speech booklet, the party's wagon, and both horses (Tommy and Timmy)",
"Three days of walking on foot north to the East Road then east toward Rivendell; approximately 20 miles per day; arrived at the bridge Tyr recognized as two days from Rivendell"
]},
{num:"12",title:"The Last Road to Rivendell",date:"Days 10-12",summary:"Final harrowing stretch of road. Corrupted wolves producing toxic green mist — do NOT burn these. An illusory waterfall entrance swallowed Mayo. The healing pool at Rivendell cleared every ailment any party member carried since the campaign began.",
events:[
"Final stretch of road east toward Rivendell; vegetation increasingly sickly, green-tinged, and wrong",
"Corrupted wolves encountered — producing toxic green mist when killed or burned; DO NOT burn these; the mist is from Dol Guldur's lingering influence on the wildlife",
"Tyr's hidden paranoia condition from Session 11 fired secretly throughout the wolf combats — his Wisdom saves were not disclosed to the party; he appeared aggressive and reckless but no one questioned it",
"Tyr hurled a javelin into the dark at a sound in the trees during the road travel — hit something real; yelping; silence; wolf prints leading away, no spear recovered",
"The approach to Rivendell: an illusory waterfall appeared across the road; Mayo walked into it and disappeared momentarily; emerged on the other side in the valley — the waterfall was the entrance",
"First sight of Rivendell: a bowl of peace, tucked beneath the immense shoulders of the mountains — pale shining stone and dark timber, light from every window, perpetual twilight where the light never truly dies",
"Two elven guards met the party at the valley entrance; escorted through cliffside paths carved into the rock; brought to a bathing chamber with a natural heated pool",
"The healing pool: every ailment, wound, curse, scar, and condition cleared for everyone who bathed — Tyr's paranoia condition lifted; Dudo's kneecap healed; all injuries gone",
"Borin stripped immediately the moment the guards left the chamber — first naked into the pool, no hesitation",
"Carl was asleep on a bench and rolled into the healing pool half-awake",
"Dudo to Carl in the pool: I think I can finally fully forgive you. My knee — it feels… I'm all better. Oh thank god. Carl: I think I can finally forgive you for touching my horn.",
"Party given silver-gray elven robes; told Elrond would receive them when he was ready"
]},
{num:"13",title:"The Last Homely House",date:"Days 12-13",summary:"Audience with Elrond. The Palantiri revealed. The mission given. Tyr given the key ring. Drinking contest aftermath. Two days east to the Misty Mountain foot. Sacrificial village found. A boy drawn in the lottery and sacrificed. Salted pork feast used to escape.",
events:[
"Elrond's audience: he was already aware of the party — Aragorn had been filing reports on Tyr specifically",
"Elrond revealed: orcs had not been near Bree since the days of Angmar; they believe the Red Claw assault was an attempt to locate a Palantir Elrond had placed in Bree nearly a century ago",
"The Palantiri: nine seeing stones made by Feanor at the dawn of the world; three to five are lost; Elrond moved the Bree stone to Lake Town before the Enemy could find it — this explains the entire Red Claw assault on Bree",
"Mission: travel to Lake Town (~300 miles northeast) and retrieve the Palantir from under the master's hall before the Enemy can use it or corrupt the master of Lake Town through it",
"Gilgamesh protested giving Tyr the key ring — Elrond gave it to Tyr anyway, over the objection",
"Tyr's response to receiving the key ring: For sure gonna touch that Palantir.",
"Elrond inscribed elvish runes (including his personal signature) into Tyr's sword personally — now +1 to hit",
"Elrond confirmed the Witch-king is not truly dead — only driven from Dol Guldur; his influence continues through corrupted wildlife",
"The elves cannot accompany the party — doing so would connect Rivendell officially to the mission",
"When asked if he was happy, Elrond paused; his wife Celebrian sailed west centuries ago; a personal sadness surfaced briefly and was set aside",
"Gilgamesh had a suppressed physical reaction when the village sacrifice creature was described — changed expression, looked away; caught by Mungo (Nat 20 insight) and Tyr (19 perception); they exchanged knowing looks; Gilgamesh deflected; unresolved",
"Informal drinking contest in the hall after the formal audience — everyone except Gilgamesh fell unconscious",
"Gilgamesh was already sipping elven champagne when the party arrived; was still sober when everyone else was on the floor; Quite the show you put on for me last night",
"Morning: outfitted with elven forest-green cloaks (+2 stealth), 2 health potions each, Lembas bread, salted pork, and a detailed map; horses sent back to Rivendell on Elrond's advice (the pass is inhumane for such creatures)",
"Two days of travel east brought them to the Misty Mountain foot; encountered Bonkey at a stream muttering just gotta make it through another night",
"Followed Bonkey to a small fortified village; witnessed the lottery; Tom — a 16-year-old boy — drew the last number; was hog-tied and throat-slit as the night's offering",
"Confronted village leader Tyndell the next morning; shared salted pork with the starving village; slipped out the front gate while the townsfolk ate",
"The creature's green-tinged bipedal tracks led diagonally toward the Misty Mountains — the same direction the party needed to travel"
]},
{num:"14",title:"Into the Green Dark",date:"Days 13-14",summary:"Fled the village through the swamp. Fence chase escape. Alligator ambush — Mungo grappled underwater. Dead Marshes water hazard: ghostly faces beneath the surface. Ben joined the party. Carl served as living alligator bait. The party began swimming toward the island.",
events:[
"Village noticed the party's absence; chase through the trees in the early morning fog",
"Fence escape sequence: Dudo and Mungo executed a spectacular tree-branch flip maneuver; Carl ran straight through the fence at full sprint (4 damage, created a party-sized hole everyone else used)",
"Tracked the creature's green slime trail through increasingly dark and twisted swamp terrain",
"Alligator ambush: two 12-15 foot alligators; one grabbed Mungo and pulled him underwater; Mungo grappled back; Gilgamesh made a Nat 20-equivalent shot (19 + craft slot = crit) directly between the alligator's eyes for 16 damage — killed it instantly, freed Mungo",
"Mungo upon surfacing: DON'T DO THAT SHIT TO ME!",
"Dead Marshes water hazard: the party fell into a sharp drop-off into deep water; half-decomposed ghostly faces beneath the surface locked viewers in place with fear-paralysis",
"Borin wrapped a rope around a tree and pulled the paralyzed party members out one by one",
"Gilgamesh's painting got wet and smeared during the rescue",
"Ben emerged from behind a tree: 19 years old, brother of Tom who was sacrificed, crude bow and 3-4 arrows, wants only revenge; party investigated (insight 24 — completely truthful); voted to let him come",
"Carl's living alligator bait plan: tied to a 100-foot rope, waded into the large central lake splashing loudly; 15 gators converged on his position from the near shore; the party hauled him back just in time",
"Party navigated the gator-heavy near shore by boat — wait, there was no boat yet; circumnavigated on foot along the shallower edges",
"Gilgamesh made the baby alligator call (performance 16) to confirm gator presence in the large lake — his throat went hoarse; he could not make the sound again",
"Gilgamesh spotted pale green logs that were actually alligators floating behind the party (perception 19)",
"Party began swimming toward the island at session end",
"Wisdom saves mid-swim as the ghostly face hazard reappeared beneath them — session cliffhanger"
]},
{num:"15",title:"Blood for Bloom — The Stump",date:"Day 14",summary:"Completed the swim to the island. Bone altar activated by Dudo's blood. Zombie combat. Ben charged Maldwin and was killed instantly. Maldwin's two-phase boss fight. Mayo shut the wardrobe. Mungo threw a blind dagger from across the room and killed Maldwin. The killing blow.",
events:[
"Party climbed onto the island; exterior investigation revealed pulsating green veins, shifting runes that could not be focused on, spongy ground leaving no footprints",
"Carl blew the Horn of the Ruins into the stump entrance (roll 10) — revealed approximately 10 feet of interior: bones and carcasses, stacked crates, a bone altar, and ripples forming in the darkness",
"COMBAT 1 — Five zombie-like humanoids at the entrance: all killed; Borin's unarmed strike (strength 20) broke the last one's neck — head hanging backward",
"Bone altar investigation: Dudo cleared five giant mutated flies (fist-sized, moth wings); squeezed bug ichor into the basin — insufficient; Dudo cut his own hand (D4: 2 damage) and dripped blood into the basin",
"The blood multiplied from a few drops to approximately two to three ounces — filled all the carved grooves — drained through the femur-grate; the DM lingered on this moment",
"On the right wall: vines reshaped and extended into a sloped vine-ramp staircase rising 20 feet through the ceiling into the chamber above",
"Stealth ascent up the vine ramp: Mungo ~30, Gilgamesh 18, Tyr 19, Dudo Nat 20 — blended so completely into the wall that Tyr walked into him and both nearly fell back down",
"Upper chamber: Maldwin's living quarters — bed, table, chair, desk, a large wardrobe, a cauldron simmering green-and-red liquid, shelves of glass jars containing floating organs",
"Maldwin stepped out from beside the wardrobe: identified himself as the last sea warden of the true light, keeper of the heart stolen from Valinor",
"Maldwin's full monologue: former healer and father; his people destroyed by Dol Guldur while the lords of Rivendell counted stars; walked to Dol Guldur's ruins; found a Valinor seed in the rubble; planted it in the stump; 19 winters of blood via the village sacrifice pact; zombie army aimed at Rivendell; offered the party eternal life from the cauldron",
"Maldwin immediately identified Gilgamesh as an elf and became consumed with rage — he brought one of them here",
"Gilgamesh's deception attempt: roll 8 — Maldwin saw through it and laughed",
"Ben charged the instant he saw Maldwin — no words, no plan, no hesitation — Maldwin hit him with a magical staff blast; Ben died instantly; Maldwin reanimated both Ben and Ben's brother as zombies",
"Mungo upon reanimated Ben: sorry I gotta do this to ya — killed him in the first round for 13 damage",
"BOSS FIGHT initiated by Dudo moving toward cauldron, spinning, and slashing (22 to hit, 9 slashing sneak attack) while Tyr shouted Ball the wardrobe!",
"Mayo ran the full 30 feet across the room and slammed the wardrobe shut (strength 12 — just barely enough) before more could emerge; two zombies had already slipped out before the door closed",
"Gilgamesh climbed on top of the wardrobe for elevation and toppled it (strength 13 + Rhymes die = 23 vs DC 20); wardrobe crashed down; party piled all available dead bodies on top to seal it",
"Carl's critical hit triggered phase 2 — four d12 damage dice; as the hit connected: Listen here, you stupid witch — you're not even a wizard!",
"Phase 2 transformation: Maldwin absorbed cauldron blood, swelled to Huge size, became partially translucent (organs visible through skin), developed tumor-like growths; unleashed a 30-foot acid cone (4d6, DC 14 Dex save)",
"Cone results: Tyr failed (17 damage + blinded); Carl failed (17 damage); Mayo failed (17 damage); Borin passed (~9 damage); Gilgamesh passed (zero); Dudo passed (zero)",
"Mungo was blinded by acid; ran across the room; located Maldwin by sound and spatial memory; threw his dagger on disadvantage — hit Maldwin directly in the side of the head; Maldwin had 4 HP remaining and collapsed",
"The table erupted. DM: Mungo just sniped him from across the room with a dagger throw on disadvantage — while blinded.",
"Remaining zombies cleaned up; session ended with Tyr hacking a peephole through the tree wall; perception 9 — dark but heard splashing outside",
"DM: Gators dont scream. Session cliffhanger."
]},
{num:"16",title:"The Seed of the Fallen Trees",date:"Days 14-15",summary:"Second zombie wave through the walls — 6-7 breach points simultaneously. Dudo's sword fell and hit Tyr in the neck (0 HP, friendly fire). Mayo's death save Nat 20. Mungo catapulted to the ceiling. Dudo's Nat 20 carved the node free — all zombies dropped. Tyr found the Iron of Death. Level up.",
events:[
"Session opened with three zombies coming up the vine ramp immediately; Tyr climbed onto Mayo's shoulders",
"Tyr attacked the ceiling node (rolled Nat 20 and 21 — took the lower = 21 to hit at disadvantage from elevation); 16 damage; all zombies in the room briefly seized up",
"Dudo climbed the vined ceiling to reach the node; sword knocked from his hand on a missed strike — fell directly onto Tyr's neck; Tyr went to 0 HP from friendly fire",
"Gilgamesh used the Ring of Mending to revive Tyr to 1 HP",
"6-7 zombie breach points through the walls simultaneously — second wave from all directions",
"Mungo threw his dagger up to Dudo (Nat 20 — stuck into the ceiling center); Dudo grabbed it",

function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

async function askClaude(messages){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:AI_SYS,messages})});
    const data=await res.json();
    return data.content?.[0]?.text||"The wiki spirits are unavailable right now.";
  }catch{return "Could not reach the AI. Please try again.";}
}

function Cin({children,sz=13,col,style={}}){return<span style={{...cin,fontSize:sz,color:col||C.gl,letterSpacing:"0.06em",...style}}>{children}</span>;}
function Badge({label,col}){return<span style={{background:col+"22",color:col,border:`1px solid ${col}44`,borderRadius:3,padding:"2px 8px",fontSize:10,...cin,letterSpacing:"0.06em"}}>{label}</span>;}
function SBadge({s}){
  if(s.includes("DECEASED"))return<Badge label="Deceased" col={C.re}/>;
  if(s.includes("UNKNOWN"))return<Badge label="Unknown" col={C.gd}/>;
  if(s.includes("HOSTILE"))return<Badge label="Hostile" col={C.re}/>;
  if(s.includes("Safe"))return<Badge label="Alive — Safe" col="#4a8a46"/>;
  return<Badge label="Alive" col="#4a8a46"/>;
}
function Card({children,onClick,style={}}){
  const[hov,setHov]=useState(false);
  return<div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:C.s2,border:`1px solid ${hov&&onClick?C.gd:C.bd}`,borderRadius:8,padding:"13px 15px",cursor:onClick?"pointer":"default",transition:"border-color 0.15s",marginBottom:10,...style}}>{children}</div>;
}
function Coll({title,children,open:def=false}){
  const[open,setOpen]=useState(def);
  return<div style={{borderTop:`1px solid ${C.bd}`}}>
    <button onClick={()=>setOpen(!open)} style={{width:"100%",background:"none",border:"none",padding:"9px 0",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
      <Cin sz={11} col={C.gd} style={{letterSpacing:"0.1em"}}>{title}</Cin>
      <span style={{color:C.gd,fontSize:13}}>{open?"▲":"▼"}</span>
    </button>
    {open&&<div style={{paddingBottom:12,...cri,fontSize:15,color:C.tx,lineHeight:1.7}}>{children}</div>}
  </div>;
}
function Back({onClick,label="Back"}){return<button onClick={onClick} style={{background:"none",border:`1px solid ${C.bd}`,color:C.dm,padding:"5px 13px",borderRadius:5,cursor:"pointer",marginBottom:14,...cin,fontSize:11,letterSpacing:"0.06em"}}>← {label}</button>;}

function AiPage(){
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);
  const send=async()=>{
    if(!input.trim()||loading)return;
    const m={role:"user",content:input};
    const next=[...msgs,m];
    setMsgs(next);setInput("");setLoading(true);
    const reply=await askClaude(next);
    setMsgs(prev=>[...prev,{role:"assistant",content:reply}]);
    setLoading(false);
  };
  return<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <PH title="Wiki AI" sub="Ask anything about the campaign"/>
    <div ref={ref} style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
      {msgs.length===0&&<Card style={{textAlign:"center",padding:"20px 16px"}}><div style={{...cri,fontSize:15,color:C.dm,fontStyle:"italic",lineHeight:1.7}}>Ask me anything about the campaign — characters, events, NPCs, what happened in a session, lore, items, relationships. I know everything through Session 17.2.</div></Card>}
      {msgs.map((m,i)=><div key={i} style={{marginBottom:10}}>
        <Cin sz={10} col={m.role==="user"?C.g:C.gd} style={{letterSpacing:"0.1em",display:"block",marginBottom:4}}>{m.role==="user"?"YOU":"WIKI AI"}</Cin>
        <Card style={{background:m.role==="user"?C.s3:C.s2}}><div style={{...cri,fontSize:15,color:C.tx,lineHeight:1.7}}>{m.content}</div></Card>
      </div>)}
      {loading&&<Card><div style={{...cri,fontSize:15,color:C.dm,fontStyle:"italic"}}>Consulting the scrolls of Middle-earth…</div></Card>}
    </div>
    <div style={{padding:"10px 16px",borderTop:`1px solid ${C.bd}`,display:"flex",gap:8,flexShrink:0}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask about the campaign…" style={{flex:1,background:C.s3,border:`1px solid ${C.bd}`,color:C.tx,borderRadius:6,padding:"10px 12px",...cri,fontSize:15}}/>
      <button onClick={send} disabled={loading} style={{background:C.gd,border:"none",color:C.bg,padding:"10px 16px",borderRadius:6,cursor:"pointer",...cin,fontSize:12}}>Ask</button>
    </div>
  </div>;
}
