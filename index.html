<head>

<title>Wanderings In Middle Earth — Wiki</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0b08;color:#ede3cc;font-family:'Crimson Text',Georgia,serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
h1,h2,h3,.cin{font-family:'Cinzel','Times New Roman',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#383020}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
nav{height:60px;background:#191410;border-top:1px solid #383020;display:flex;flex-shrink:0}

.page{padding:0 0 80px;max-width:700px;margin:0 auto}
.page-head{padding:18px 16px 12px;border-bottom:1px solid #383020;margin-bottom:12px}
.page-head h1{font-size:20px;color:#e6cc84;letter-spacing:.07em}
.page-head p{color:#9a8a6a;font-size:14px;margin-top:3px}

.card{background:#222018;border:1px solid #383020;border-radius:8px;padding:13px 15px;margin-bottom:10px;touch-action:manipulation}
.card.clickable{cursor:pointer;-webkit-tap-highlight-color:rgba(200,164,74,.15)}
.card.clickable:active{background:#2a2820}

.btn{border:none;cursor:pointer;font-family:'Cinzel',serif;touch-action:manipulation;-webkit-tap-highlight-color:rgba(200,164,74,.15)}
.btn-nav{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#5a4e38;border-top:2px solid transparent;transition:all .15s;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;padding:0;touch-action:manipulation}
.btn-nav.active{color:#e6cc84;border-top-color:#c8a44a}
.btn-nav span.icon{font-size:18px}

.badge{border-radius:3px;padding:2px 8px;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.06em}
.badge-alive{background:#4a8a4622;color:#4a8a46;border:1px solid #4a8a4644}
.badge-dead{background:#8b282822;color:#8b2828;border:1px solid #8b282844}
.badge-unknown{background:#7a603022;color:#7a6030;border:1px solid #7a603044}
.badge-hostile{background:#8b282822;color:#8b2828;border:1px solid #8b282844}
.badge-safe{background:#4a8a4622;color:#4a8a46;border:1px solid #4a8a4644}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.back-btn{background:none;border:1px solid #383020;color:#9a8a6a;padding:5px 13px;border-radius:5px;cursor:pointer;margin-bottom:14px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;display:block;touch-action:manipulation}
.section-label{font-family:'Cinzel',serif;font-size:11px;color:#7a6030;letter-spacing:.1em;display:block;margin:14px 0 8px}

.collapsible{border-top:1px solid #383020}
.coll-btn{width:100%;background:none;border:none;padding:9px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;color:#7a6030;letter-spacing:.1em;touch-action:manipulation}
.coll-body{padding-bottom:12px;font-size:15px;line-height:1.7;color:#ede3cc}

.dot{color:#7a6030;flex-shrink:0;margin-top:3px}
.fact-row{display:flex;gap:10px;margin-bottom:7px;align-items:flex-start}
.fact-row .dot{font-size:14px}

.more-drawer{position:absolute;bottom:60px;left:0;right:0;background:#191410;border-top:1px solid #383020;padding:12px 16px;z-index:20}
.more-overlay{position:absolute;inset:0;z-index:15}

textarea{resize:vertical;width:100%;background:#2c2a1e;border:1px solid #383020;color:#ede3cc;border-radius:5px;padding:8px 10px;font-family:'Crimson Text',Georgia,serif;font-size:15px;min-height:80px}
input[type=text]{width:100%;background:#2c2a1e;border:1px solid #383020;color:#ede3cc;border-radius:5px;padding:8px 10px;font-family:'Crimson Text',Georgia,serif;font-size:15px;margin-bottom:8px}

.ai-input-row{padding:10px 16px;border-top:1px solid #383020;display:flex;gap:8px;flex-shrink:0}
.ai-input{flex:1;background:#2c2a1e;border:1px solid #383020;color:#ede3cc;border-radius:6px;padding:10px 12px;font-family:'Crimson Text',Georgia,serif;font-size:15px}
.ai-send{background:#7a6030;border:none;color:#0d0b08;padding:10px 16px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;touch-action:manipulation}

.status-row{display:flex;justify-content:space-between;margin-bottom:5px}
.note-area{background:#2c2a1e;border:1px solid #383020;border-radius:5px;padding:9px 11px;cursor:text;min-height:44px;font-size:15px;line-height:1.6;color:#5a4e38}
.note-area.has-note{color:#ede3cc}

.search-input{width:100%;background:#222018;border:1px solid #383020;color:#ede3cc;border-radius:8px;padding:12px 14px;font-family:'Crimson Text',Georgia,serif;font-size:16px;margin-bottom:12px}

.tab-btn{flex:1;background:#222018;border:1px solid #383020;color:#9a8a6a;padding:8px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.05em;touch-action:manipulation}
.tab-btn.active{background:#7a6030;border-color:#7a6030;color:#0d0b08}

.must-section{margin-bottom:18px}
.must-title{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom-width:1px;border-bottom-style:solid}
</style>
</head>

  document.body.style.color = '#e6cc84';
  document.body.style.fontFamily = 'monospace';
  document.body.style.padding = '20px';
  document.body.innerHTML = '<h2 style="color:#8b2828;margin-bottom:12px">JavaScript Error</h2><p style="margin-bottom:8px"><strong>' + msg + '</strong></p><p>Line ' + line + ', Col ' + col + '</p><p style="margin-top:8px;color:#9a8a6a">' + src + '</p>';

};

{id:"borin",name:'Borin "The Tall" Ironjaw',player:"Josh",race:"Dwarf Warden",emoji:"⚒️",tag:"Pragmatic, fatherly. Fights for his family back home.",bio:"Borin negotiated 2,000 gold from Mayor Graf before agreeing to anything, carried young Leah on his back until she fell asleep on his shoulders, and once hid behind a dead cow from three trolls while privately noting that urinating on himself was 'warm and comforting.' He misses his wife and kids.",facts:["Rumor of the Earth: sense orcs within 3 miles once per rest","Horic's Iron Hand Fang: +1 warhammer, DC 13 crowd-control on all nearby targets","Negotiated 2,000 gold + shield + horses from Mayor Graf after the Battle of Bree","Carried Leah miles through wilderness — waved until out of sight, then ran"],funny:["Named his palm-leaf rain hat 'Leafster' and carried it through a thunderstorm","Urinated on himself hiding from trolls — noted it was 'actually warm and comforting'","Picked up Mungo and threw him at Gilgamesh to break up a fight (Gilgamesh caught him)"],arc:"Borin fights for his family. Every session reminds him that orcs are reaching places they were never supposed to reach."},

// ── HELPERS ────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e[k.toLowerCase()] = v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => { if (c != null) e.append(typeof c === 'string' ? c : c); });
  return e;
}

function badge(status) {
  const cls = status === 'alive' ? 'alive' : status === 'safe' ? 'safe' : status === 'hostile' ? 'hostile' : status === 'dead' ? 'dead' : 'unknown';
  const label = status === 'alive' ? 'Alive' : status === 'safe' ? 'Alive — Safe' : status === 'hostile' ? 'Hostile' : status === 'dead' ? 'Deceased' : 'Unknown';
  return el('span', {className: `badge badge-${cls}`}, label);
}

function card(content, onClick) {
  const d = el('div', {className: 'card' + (onClick ? ' clickable' : '')});
  if (typeof content === 'string') d.innerHTML = content;
  else if (content instanceof Element) d.appendChild(content);
  else if (Array.isArray(content)) content.forEach(c => { if (c) d.appendChild(typeof c === 'string' ? (() => { const s = document.createElement('span'); s.textContent = c; return s; })() : c); });
  if (onClick) d.onclick = onClick;
  return d;
}

function backBtn(label, cb) {
  const b = el('button', {className: 'back-btn'}, '← ' + label);
  b.onclick = cb;
  return b;
}

function collapsible(title, content, open) {
  const div = el('div', {className: 'collapsible'});
  const btn = el('button', {className: 'coll-btn'});
  btn.innerHTML = `<span>${title}</span><span>${open ? '▲' : '▼'}</span>`;
  const body = el('div', {className: 'coll-body'});
  body.style.display = open ? 'block' : 'none';
  if (typeof content === 'string') body.innerHTML = content;
  else body.appendChild(content);
  btn.onclick = () => {
    const isOpen = body.style.display !== 'none';
    body.style.display = isOpen ? 'none' : 'block';
    btn.querySelector('span:last-child').textContent = isOpen ? '▼' : '▲';
  };
  div.appendChild(btn); div.appendChild(body);
  return div;
}

    [...sugs].reverse().forEach(s => {
      const c = el('div', {className: 'card'});
      c.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-family:'Cinzel',serif;font-size:11px;color:#c8a44a">${s.player}</span><span style="font-family:'Cinzel',serif;font-size:10px;color:#5a4e38">${s.date}</span></div><p style="font-size:15px;line-height:1.65">${s.text}</p>`;
      inner.appendChild(c);
    });
  }
  p.appendChild(inner);
  return p;
}

// ── RENDER ────────────────────────────────────────────────────
function getPageContent() {
  switch(page) {
    case 'home': return renderHome();
    case 'party': return renderParty();
    case 'npcs': return renderNPCs();
    case 'sessions': return renderSessions();
    case 'mysteries': return renderMysteries();
    case 'moments': return renderMoments();
    case 'mustknow': return renderMustKnow();
    case 'suggestions': return renderSuggestions();
    default: return renderHome();
  }
}

function renderMoreDrawer() {
  let drawer = document.getElementById('more-drawer');
  let overlay = document.getElementById('more-overlay');
  if (!more) { if (drawer) drawer.remove(); if (overlay) overlay.remove(); return; }
  if (!drawer) {
    overlay = el('div', {id: 'more-overlay', className: 'more-overlay'});
    overlay.onclick = () => { more = false; renderNav(); renderMoreDrawer(); };
    drawer = el('div', {id: 'more-drawer', className: 'more-drawer'});
    document.getElementById('app').appendChild(overlay);
    document.getElementById('app').appendChild(drawer);
  }
  drawer.innerHTML = '';
  const grid = el('div', {className: 'grid-2'});
  MORE_PAGES.forEach(pg => {
    const b = el('button', {className: 'btn', style: 'background:#222018;border:1px solid #383020;color:#e6cc84;padding:11px 10px;border-radius:7px;text-align:left;display:flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.05em'});
    b.innerHTML = `<span style="font-size:16px">${pg.icon}</span>${pg.label}`;
    b.onclick = () => navigate(pg.id);
    grid.appendChild(b);
  });
  drawer.appendChild(grid);
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  TABS.forEach(t => {
    const b = el('button', {className: 'btn-nav' + (t.id==='more' ? (more?' active':'') : (page===t.id&&!more?' active':''))});
    b.innerHTML = `<span class="icon">${t.icon}</span>${t.label}`;
    b.onclick = t.id === 'more' ? toggleMore : () => navigate(t.id);
    nav.appendChild(b);
  });
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.appendChild(getPageContent());
  content.scrollTop = 0;
  renderNav();
  renderMoreDrawer();
}

// ── INIT ──────────────────────────────────────────────────────
try {
  render();
} catch(e) {
  document.body.style.background = '#0d0b08';
  document.body.style.color = '#e6cc84';
  document.body.style.fontFamily = 'monospace';
  document.body.style.padding = '20px';
  document.body.innerHTML = '<h2 style="color:#8b2828;margin-bottom:12px">Runtime Error</h2><p style="margin-bottom:8px"><strong>' + e.message + '</strong></p><pre style="color:#9a8a6a;white-space:pre-wrap;font-size:12px">' + e.stack + '</pre>';
}
</script>
</body>
</html>
