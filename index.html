        </div>)}
      </div>
      <Card style={{marginBottom:12,background:C.gr+"22",border:`1px solid ${C.gr}44`}}>
        <Cin sz={10} col={C.gd} style={{letterSpacing:"0.12em",display:"block",marginBottom:6}}>PARTY DEATHS</Cin>
        <div style={{...cri,fontSize:15,color:C.gl,lineHeight:1.6}}>Zero. Nobody has died. They have gone to 0 HP many times. They have had Nat 20 death saves. They have been poisoned, liver-stabbed, acid-coned, and bitten by zombies. Nobody has died.</div>
      </Card>
      <Cin sz={10} col={C.gd} style={{letterSpacing:"0.12em",display:"block",marginBottom:10}}>CONFIRMED NAT 20s ({STATS.nat20s.length} recorded)</Cin>
      {STATS.nat20s.map((n,i)=><Card key={i}>
        <Cin sz={11} col={C.g} style={{display:"block",marginBottom:4}}>{n.who} · Session {n.s}</Cin>
        <div style={{...cri,fontSize:14,color:C.tx,lineHeight:1.6}}>{n.t}</div>
      </Card>)}
      <Cin sz={10} col={C.gd} style={{letterSpacing:"0.12em",display:"block",margin:"14px 0 10px"}}>BIGGEST HITS</Cin>
      {STATS.biggestHits.map((h,i)=><Card key={i}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <Cin sz={11} col={C.g}>{h.who} · Session {h.s}</Cin>
          <span style={{...cin,fontSize:18,color:C.re}}>{h.dmg} dmg</span>
        </div>
        <div style={{...cri,fontSize:14,color:C.tx,lineHeight:1.6}}>{h.t}</div>
      </Card>)}
    </div>
  </PW>;
}


function Search({go}){
  const[q,setQ]=useState("");
  const results=()=>{
    if(q.trim().length<2)return[];
    const s=q.toLowerCase();
    const r=[];
    PARTY.forEach(p=>{
      if(p.name.toLowerCase().includes(s)||p.bio.toLowerCase().includes(s)||p.tag.toLowerCase().includes(s)||p.arc.toLowerCase().includes(s)){
        r.push({type:"Character",icon:p.emoji,title:p.name,sub:p.player+" · "+p.race,action:()=>go("party-"+p.id)});
      }
      p.facts.forEach(f=>{if(f.toLowerCase().includes(s)&&!r.find(x=>x.title===p.name))r.push({type:"Character",icon:p.emoji,title:p.name,sub:"Fact: "+f.slice(0,60)+"…",action:()=>go("party-"+p.id)});});
      p.moments.forEach(m=>{if(m.t.toLowerCase().includes(s)&&!r.find(x=>x.title===p.name))r.push({type:"Character",icon:p.emoji,title:p.name,sub:"Session "+m.s+": "+m.t.slice(0,60)+"…",action:()=>go("party-"+p.id)});});
    });
    NPCS.forEach(n=>{
      if(n.name.toLowerCase().includes(s)||n.desc.toLowerCase().includes(s)||n.role.toLowerCase().includes(s)){
        r.push({type:"NPC",icon:n.emoji,title:n.name,sub:n.role,action:()=>go("npc-"+n.id)});
      }
      if(n.facts)n.facts.forEach(f=>{if(f.toLowerCase().includes(s)&&!r.find(x=>x.title===n.name))r.push({type:"NPC",icon:n.emoji,title:n.name,sub:"Known: "+f.slice(0,60)+"…",action:()=>go("npc-"+n.id)});});
    });
    SESSIONS.forEach(ses=>{
      if(ses.title.toLowerCase().includes(s)||ses.summary.toLowerCase().includes(s)){
        r.push({type:"Session",icon:"📖",title:"Session "+ses.num+": "+ses.title,sub:ses.date,action:()=>go("session-"+ses.num)});
      }
      if(ses.events)ses.events.forEach(e=>{if(e.toLowerCase().includes(s)&&!r.find(x=>x.title==="Session "+ses.num+": "+ses.title))r.push({type:"Session",icon:"📖",title:"Session "+ses.num+": "+ses.title,sub:e.slice(0,70)+"…",action:()=>go("session-"+ses.num)});});
    });
    ITEMS.forEach(it=>{
      if(it.name.toLowerCase().includes(s)||it.desc.toLowerCase().includes(s)){
        r.push({type:"Item",icon:it.emoji,title:it.name,sub:"Held by: "+it.holder,action:()=>go("items")});
      }
    });
    BESTIARY.forEach(b=>{
      if(b.name.toLowerCase().includes(s)||b.desc.toLowerCase().includes(s)){
        r.push({type:"Creature",icon:b.emoji,title:b.name,sub:b.status,action:()=>go("bestiary-"+b.id)});
      }
    });
    FACTIONS.forEach(f=>{
      if(f.name.toLowerCase().includes(s)||f.desc.toLowerCase().includes(s)){
        r.push({type:"Faction",icon:f.emoji,title:f.name,sub:f.alignment+" · "+f.status,action:()=>go("faction-"+f.id)});
      }
    });
    MYSTERIES.forEach((m,i)=>{
      if(m.toLowerCase().includes(s))r.push({type:"Mystery",icon:"❓",title:"Mystery #"+(i+1),sub:m.slice(0,70)+"…",action:()=>go("mysteries")});
    });
    FUNNY.forEach(f=>{
      if(f.t.toLowerCase().includes(s)||f.who.toLowerCase().includes(s))r.push({type:"Funny Moment",icon:"😄",title:f.who+" (Session "+f.s+")",sub:f.t.slice(0,70)+"…",action:()=>go("moments")});
    });
    GREATEST.forEach(g=>{
      if(g.t.toLowerCase().includes(s)||g.who.toLowerCase().includes(s))r.push({type:"Epic Moment",icon:"⭐",title:g.who+" (Session "+g.s+")",sub:g.t.slice(0,70)+"…",action:()=>go("moments")});
    });
    return r.slice(0,20);
  };
  const res=results();
  const typeColor={Character:C.g,NPC:"#4a8a46",Session:C.gd,Item:"#5a7a9a",Creature:C.re,Faction:"#7a5a9a","Mystery":C.gd,"Funny Moment":C.dm,"Epic Moment":C.g};
  return<PW>
    <PH title="Search" sub="Search everything — characters, sessions, NPCs, items, moments"/>
    <div style={{padding:"0 16px"}}>
      <div style={{position:"relative",marginBottom:16}}>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search the campaign…" style={{width:"100%",background:C.s2,border:`1px solid ${C.bd}`,color:C.tx,borderRadius:8,padding:"12px 14px",...cri,fontSize:16}}/>
        {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.dm,cursor:"pointer",fontSize:18,padding:0}}>×</button>}
      </div>
      {q.trim().length>0&&q.trim().length<2&&<div style={{...cri,fontSize:14,color:C.dm,textAlign:"center",padding:"8px 0"}}>Keep typing…</div>}
      {q.trim().length>=2&&res.length===0&&<div style={{...cri,fontSize:15,color:C.dm,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>Nothing found for "{q}"</div>}
      {res.map((r,i)=><Card key={i} onClick={()=>{r.action();}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{fontSize:22}}>{r.icon}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <span style={{background:(typeColor[r.type]||C.gd)+"22",color:typeColor[r.type]||C.gd,border:`1px solid ${(typeColor[r.type]||C.gd)}44`,borderRadius:3,padding:"1px 7px",fontSize:9,...cin,letterSpacing:"0.06em"}}>{r.type.toUpperCase()}</span>
            </div>
            <div style={{...cin,fontSize:13,color:C.gl,marginBottom:2}}>{r.title}</div>
            <div style={{...cri,fontSize:13,color:C.dm,lineHeight:1.4}}>{r.sub}</div>
          </div>
          <span style={{color:C.gd,fontSize:18}}>›</span>
        </div>
      </Card>)}
      {res.length===20&&<div style={{...cri,fontSize:13,color:C.mt,textAlign:"center",padding:"8px 0",fontStyle:"italic"}}>Showing top 20 results — be more specific to narrow down</div>}
    </div>
  </PW>;
}

const TABS=[{id:"home",label:"Home",icon:"🏠"},{id:"party",label:"Party",icon:"⚔️"},{id:"sessions",label:"Sessions",icon:"📖"},{id:"search",label:"Search",icon:"🔍"},{id:"more",label:"More",icon:"✦"}];
const MORE=[{id:"world",label:"World",icon:"🌍"},{id:"items",label:"Items",icon:"💎"},{id:"mysteries",label:"Mysteries",icon:"❓"},{id:"moments",label:"Moments",icon:"⭐"},{id:"bestiary",label:"Bestiary",icon:"🐉"},{id:"factions",label:"Factions",icon:"⚔️"},{id:"timeline",label:"Timeline",icon:"📅"},{id:"stats",label:"Campaign Stats",icon:"📊"},{id:"suggestions",label:"Suggestions",icon:"💬"},{id:"ai",label:"Wiki AI",icon:"🔮"}];

function App(){
  const[page,setPage]=useState("home");
  const[more,setMore]=useState(false);
  const[worldTab,setWorldTab]=useState("npcs");
  const[sugs,setSugs]=useState(()=>lsGet("mew-sugs")||[]);
  const[edits,setEdits]=useState(()=>lsGet("mew-edits")||{});
  const[npcDirect,setNpcDirect]=useState(null);
  const[partyDirect,setPartyDirect]=useState(null);
  const[sessionDirect,setSessionDirect]=useState(null);
  const[bestiaryDirect,setBestiaryDirect]=useState(null);
  const[factionDirect,setFactionDirect]=useState(null);
  const go=p=>{
    setMore(false);
    if(p.startsWith("npc-")){setPage("world");setNpcDirect(p.slice(4));setPartyDirect(null);setSessionDirect(null);setBestiaryDirect(null);setFactionDirect(null);return;}
    if(p.startsWith("party-")){setPage("party");setPartyDirect(p.slice(6));setNpcDirect(null);setSessionDirect(null);setBestiaryDirect(null);setFactionDirect(null);return;}
    if(p.startsWith("session-")){setPage("sessions");setSessionDirect(p.slice(8));setNpcDirect(null);setPartyDirect(null);setBestiaryDirect(null);setFactionDirect(null);return;}
    if(p.startsWith("bestiary-")){setPage("bestiary");setBestiaryDirect(p.slice(9));setNpcDirect(null);setPartyDirect(null);setSessionDirect(null);setFactionDirect(null);return;}
    if(p.startsWith("faction-")){setPage("factions");setFactionDirect(p.slice(8));setNpcDirect(null);setPartyDirect(null);setSessionDirect(null);setBestiaryDirect(null);return;}
    setPage(p);setNpcDirect(null);setPartyDirect(null);setSessionDirect(null);setBestiaryDirect(null);setFactionDirect(null);
  };
  const onSaveNote=(id,note)=>{const e={...edits,[id]:{...(edits[id]||{}),note}};setEdits(e);lsSet("mew-edits",e);};
  const onAddSug=s=>{const arr=[...sugs,s];setSugs(arr);lsSet("mew-sugs",arr);};
  const renderPage=()=>{
    if(page==="home")return<Home go={go}/>;
    if(page==="party")return<Party edits={edits} onSave={onSaveNote} directSel={partyDirect} onDirectClear={()=>setPartyDirect(null)}/>;
    if(page==="world")return<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {npcDirect&&<style>{".npc-auto-open{}"}</style>}
      <div style={{display:"flex",gap:8,padding:"12px 16px 0",flexShrink:0}}>
        {[["npcs","NPCs"],["locations","Locations"]].map(([id,label])=><button key={id} onClick={()=>setWorldTab(id)} style={{flex:1,background:worldTab===id?C.gd:C.s2,border:`1px solid ${worldTab===id?C.gd:C.bd}`,color:worldTab===id?C.bg:C.dm,padding:8,borderRadius:6,cursor:"pointer",...cin,fontSize:12,letterSpacing:"0.05em"}}>{label}</button>)}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>{worldTab==="npcs"?<Npcs directSel={npcDirect} onDirectClear={()=>setNpcDirect(null)}/>:<Locs/>}</div>
    </div>;
    if(page==="sessions")return<Sessions directSel={sessionDirect} onDirectClear={()=>setSessionDirect(null)}/>;
    if(page==="items")return<Items/>;
    if(page==="mysteries")return<Mysteries/>;
    if(page==="moments")return<Moments/>;
    if(page==="suggestions")return<Suggestions sugs={sugs} onAdd={onAddSug}/>;
    if(page==="ai")return<AiPage/>;
    if(page==="bestiary")return<Bestiary directSel={bestiaryDirect} onDirectClear={()=>setBestiaryDirect(null)}/>;
    if(page==="factions")return<Factions directSel={factionDirect} onDirectClear={()=>setFactionDirect(null)}/>;
    if(page==="timeline")return<Timeline/>;
    if(page==="stats")return<CampaignStats/>;
    if(page==="search")return<Search go={go}/>;
    return<Home go={go}/>;
  };
  return<div style={{background:C.bg,color:C.tx,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",...cri}}>
    {more&&<div style={{position:"absolute",bottom:60,left:0,right:0,background:C.s1,borderTop:`1px solid ${C.bd}`,padding:"12px 16px",zIndex:20}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
        {MORE.map(m=><button key={m.id} onClick={()=>go(m.id)} style={{background:C.s2,border:`1px solid ${C.bd}`,color:C.gl,padding:"11px 10px",borderRadius:7,cursor:"pointer",...cin,fontSize:12,letterSpacing:"0.05em",textAlign:"left",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{m.icon}</span>{m.label}</button>)}
      </div>
    </div>}
    <div style={{flex:1,overflowY:"auto"}}>{renderPage()}</div>
    <nav style={{height:60,background:C.s1,borderTop:`1px solid ${C.bd}`,display:"flex",flexShrink:0}}>
      {TABS.map(t=>{
        const active=t.id==="more"?more:(page===t.id&&!more);
        return<button key={t.id} onClick={()=>t.id==="more"?setMore(!more):go(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,color:active?C.gl:C.mt,borderTop:active?`2px solid ${C.g}`:"2px solid transparent",transition:"all 0.15s"}}>
          <span style={{fontSize:18}}>{t.icon}</span>
          <span style={{...cin,fontSize:9,letterSpacing:"0.05em"}}>{t.label}</span>
        </button>;
      })}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
