<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0b08;color:#ede3cc;font-family:'Crimson Text',Georgia,serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
h1,h2,h3,.cin{font-family:'Cinzel','Times New Roman',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#383020}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
nav{height:60px;background:#191410;border-top:1px solid #383020;display:flex;flex-shrink:0}

.page{padding:0 0 80px;max-width:700px;margin:0 auto}
.page-head{padding:18px 16px 12px;border-bottom:1px solid #383020;margin-bottom:12px}
.page-head h1{font-size:20px;color:#e6cc84;letter-spacing:.07em}
.page-head p{color:#9a8a6a;font-size:14px;margin-top:3px}

.card{background:#222018;border:1px solid #383020;border-radius:8px;padding:13px 15px;margin-bottom:10px;touch-action:manipulation}
.card.clickable{cursor:pointer;-webkit-tap-highlight-color:rgba(200,164,74,.15)}
.card.clickable:active{background:#2a2820}

.btn{border:none;cursor:pointer;font-family:'Cinzel',serif;touch-action:manipulation;-webkit-tap-highlight-color:rgba(200,164,74,.15)}
.btn-nav{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#5a4e38;border-top:2px solid transparent;transition:all .15s;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;padding:0;touch-action:manipulation}
.btn-nav.active{color:#e6cc84;border-top-color:#c8a44a}
.btn-nav span.icon{font-size:18px}

.badge{border-radius:3px;padding:2px 8px;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.06em}
.badge-alive{background:#4a8a4622;color:#4a8a46;border:1px solid #4a8a4644}
.badge-dead{background:#8b282822;color:#8b2828;border:1px solid #8b282844}
.badge-unknown{background:#7a603022;color:#7a6030;border:1px solid #7a603044}
.badge-hostile{background:#8b282822;color:#8b2828;border:1px solid #8b282844}
.badge-safe{background:#4a8a4622;color:#4a8a46;border:1px solid #4a8a4644}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.back-btn{background:none;border:1px solid #383020;color:#9a8a6a;padding:5px 13px;border-radius:5px;cursor:pointer;margin-bottom:14px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;display:block;touch-action:manipulation}
.section-label{font-family:'Cinzel',serif;font-size:11px;color:#7a6030;letter-spacing:.1em;display:block;margin:14px 0 8px}

.collapsible{border-top:1px solid #383020}
.coll-btn{width:100%;background:none;border:none;padding:9px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;color:#7a6030;letter-spacing:.1em;touch-action:manipulation}
.coll-body{padding-bottom:12px;font-size:15px;line-height:1.7;color:#ede3cc}

.dot{color:#7a6030;flex-shrink:0;margin-top:3px}
.fact-row{display:flex;gap:10px;margin-bottom:7px;align-items:flex-start}
.fact-row .dot{font-size:14px}

.more-drawer{position:absolute;bottom:60px;left:0;right:0;background:#191410;border-top:1px solid #383020;padding:12px 16px;z-index:20;max-height:60vh;overflow-y:auto}
.more-overlay{position:absolute;inset:0;z-index:15}

textarea{resize:vertical;width:100%;background:#2c2a1e;border:1px solid #383020;color:#ede3cc;border-radius:5px;padding:8px 10px;font-family:'Crimson Text',Georgia,serif;font-size:15px;min-height:80px}
input[type=text]{width:100%;background:#2c2a1e;border:1px solid #383020;color:#ede3cc;border-radius:5px;padding:8px 10px;font-family:'Crimson Text',Georgia,serif;font-size:15px;margin-bottom:8px}

.ai-input-row{padding:10px 16px;border-top:1px solid #383020;display:flex;gap:8px;flex-shrink:0}
.ai-input{flex:1;background:#2c2a1e;border:1px solid #383020;color:#ede3cc;border-radius:6px;padding:10px 12px;font-family:'Crimson Text',Georgia,serif;font-size:15px}
.ai-send{background:#7a6030;border:none;color:#0d0b08;padding:10px 16px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;touch-action:manipulation}

.status-row{display:flex;justify-content:space-between;margin-bottom:5px}
.note-area{background:#2c2a1e;border:1px solid #383020;border-radius:5px;padding:9px 11px;cursor:text;min-height:44px;font-size:15px;line-height:1.6;color:#5a4e38}
.note-area.has-note{color:#ede3cc}

.search-input{width:100%;background:#222018;border:1px solid #383020;color:#ede3cc;border-radius:8px;padding:12px 14px;font-family:'Crimson Text',Georgia,serif;font-size:16px;margin-bottom:12px}

.tab-btn{flex:1;background:#222018;border:1px solid #383020;color:#9a8a6a;padding:8px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.05em;touch-action:manipulation}
.tab-btn.active{background:#7a6030;border-color:#7a6030;color:#0d0b08}

.must-section{margin-bottom:18px}
.must-title{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom-width:1px;border-bottom-style:solid}
</style>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.body.style.background = '#0d0b08';
  document.body.style.color = '#e6cc84';
  document.body.style.fontFamily = 'monospace';
  document.body.style.padding = '20px';
  document.body.innerHTML = '<h2 style="color:#8b2828;margin-bottom:12px">JavaScript Error</h2><p style="margin-bottom:8px"><strong>' + msg + '</strong></p><p>Line ' + line + ', Col ' + col + '</p><p style="margin-top:8px;color:#9a8a6a">' + src + '</p>';
  return false;
};

const PARTY=[
{id:"borin",name:'Borin "The Tall" Ironjaw',player:"Josh",race:"Dwarf Warden",emoji:"⚒",tag:"Pragmatic, fatherly. Fights for his family back home.",bio:"Borin negotiated 2,000 gold from Mayor Graf before agreeing to anything, carried young Leah on his back until she fell asleep on his shoulders, and once hid behind a dead cow from three trolls while privately noting that urinating on himself was 'warm and comforting.' He misses his wife and kids.",facts:["Rumor of the Earth: sense orcs within 3 miles once per rest","Horic's Iron Hand Fang: +1 warhammer, DC 13 crowd-control on all nearby targets","Negotiated 2,000 gold + shield + horses from Mayor Graf after the Battle of Bree","Carried Leah miles through wilderness — waved until out of sight, then ran"],funny:["Named his palm-leaf rain hat 'Leafster' and carried it through a thunderstorm","Urinated on himself hiding from trolls — noted it was 'actually warm and comforting'","Picked up Mungo and threw him at Gilgamesh to break up a fight (Gilgamesh caught him)"],arc:"Borin fights for his family. Every session reminds him that orcs are reaching places they were never supposed to reach."},
{id:"carl",name:"Carl Pickthron",player:"Tyler",race:"Human Fighter (Champion)",emoji:"\uD83E\uDE93",tag:"Brave to the point of recklessness. Carries grief loudly.",bio:"Carl was drunk at the Prancing Pony talking about Mungo before the battle. He volunteered as living alligator bait because he trusted the party with his life. He declared 'Listen here, you stupid witch — you're not even a wizard!' right before the crit that triggered Maldwin's phase 2.",facts:["Crits on 19-20 with 4d12 extra damage dice","Holds the Horn of the Ruins (3D echolocation when blown clearly)","Accidentally knocked Dudo unconscious with his greataxe over a Horn dispute","Volunteered as living alligator bait — 15 gators converged; hauled back in time"],funny:["Was drunk polishing his greataxe before the biggest battle in living memory","Slumped onto Borin when the poisoned mead hit while driving the wagon","THERE WAS A BOAT. Carl had seen it. Said nothing. Party swam through alligators."],arc:"Carl is brave and loud about his grief. He runs toward danger as fast as his legs carry him."},
{id:"dudo",name:"Dudo Maggot",player:"Calvin",race:"Halfling Rogue",emoji:"\uD83D\uDDE1",tag:"Tiny, lethal, almost certainly the party's most dangerous member.",bio:"Dudo is 3 feet tall, rolls stealth 26, and wrote 'Santa's Little Helper' on Tyr's forehead while he meditated — said nothing until Finn the blacksmith noticed in Bree. The blood altar in Maldwin's stump responded specifically to his blood. Nobody has asked why.",facts:["Stealth 26 — described as becoming 'one with the shadows'","Nat 20 sneak attack up through an orc's groin — the campaign's opening kill","Jet-black dagger found inside a troll's thigh (+1 to hit, Con save on hit)","His blood activated the bone altar — multiplied significantly on contact"],funny:["Wrote 'Santa's Little Helper' on Tyr's forehead while he meditated","Skied off the moving wagon during a rainstorm using a rope and cooking pan","Sword fell during ceiling climb and hit Tyr in the neck — friendly fire 0 HP"],arc:"Dudo is the party's quiet lethal engine. The blood altar responding specifically to his blood is a thread that hasn't been pulled yet."},
{id:"gilgamesh",name:"Gilgamesh Artemis",player:"Aaron / AP",race:"Elf Scholar / Archer",emoji:"\uD83C\uDFF9",tag:"Artist. Tactician. The only one conscious during the mead incident.",bio:"Gilgamesh built a Nat 20 camouflaged sniper nest on the mayor's roof. He holds the Ring of Mending. He had a reaction when the village sacrifice creature was described at Rivendell that both Mungo and Tyr caught. He deflected. It has not been explained.",facts:["Ring of Mending: revive 1 downed to 1 HP (1/long rest); cure poison (2/day)","Shortbow +6 — awarded as annual hunt prize from Mayor Graf","Barrel explosion: gate destroyed + 15-20 orcs gone simultaneously","Had a suppressed reaction at Rivendell — caught by Mungo (Nat 20) and Tyr (19)"],funny:["Got buzzed 'investigating' the farmstead wine barrel — Tyr's arrow then punctured it","Nearly fell off the mayor's 3-story roof building his sniper nest","Protested Elrond giving Tyr the key ring — Elrond gave it to Tyr anyway"],arc:"Gilgamesh brings an elf's long perspective. He knows something about the Dol Guldur corruption he hasn't said."},
{id:"mayo",name:"Mayo (May O.)",player:"Alec",race:"Dwarf Captain / Healer",emoji:"\uD83D\uDEE1",tag:"The reliable backbone. Makes sure things don't fall apart.",bio:"Mayo pumped the artesian well while wounded at ~4 HP. They ran 30 feet to slam the wardrobe shut on the zombie horde — strength 12, barely made it. Tried to tame an evil wolf three times. It had just eaten a family. It refused every time. Mayo kept trying.",facts:["Protection: impose disadvantage on attacks against adjacent allies","Ran 30 feet to slam wardrobe shut — prevented a fight-ending zombie wave","Went down to a zombie bite — death save Nat 20 — stabilized at 1 HP","Let Tyr stand on her shoulders to reach the ceiling node"],funny:["Tried to tame an evil wolf three times with patient animal handling. It refused every time.","Mungo kept nudging the wagon horses faster when she told him to slow down, grinning","'That hurt.' — first words after Borin woke her from death's door with face-slaps"],arc:"Mayo is the party's quiet indispensable. The unglamorous calls are always Mayo."},
{id:"mungo",name:"Mungo Grubb",player:"Jesse (DM)",race:"Hobbit Treasure Hunter",emoji:"\uD83D\uDD2A",tag:"More dangerous than he looks. Much more.",bio:"Mungo is a cheerful hobbit who used to be a burglar and has a personal friendship with Beorn. He silently killed three orcs inside a burning farmhouse — Gilgamesh watched from 200 feet and never heard a sound. He threw a dagger blind, running, on disadvantage, and hit Maldwin in the head for the killing blow.",facts:["Former burglar — Beorn caught him stealing and they became genuine friends over 7 years","Silent triple kill inside the burning farmhouse — Gilgamesh never heard a thing","Catapulted to the ceiling by Tyr + Borin (strength check 24 + 21)","Blind dagger throw, running, on disadvantage — hit Maldwin in the head. The killing blow."],funny:["Health potion turned 'nasty yellow' after dipping a sanitizing finger in it","Kept nudging the wagon horses faster after being told to slow down, grinning","Yelled 'FOR CARL!' charging up a cliff at the goblin that just dropped Carl"],arc:"Mungo is the campaign's wild card — cheerful, lethal, loyal, connected to Beorn in ways the party doesn't fully understand."},
{id:"tyr",name:"Tyr",player:"Gabe",race:"Ranger of the North (Dunedain)",emoji:"⚔",tag:"Elrond knows his name. Aragorn files reports about him.",bio:"Tyr is a Dunedain Ranger. Elrond had already heard of him through Aragorn before the party arrived. He carries the Iron of Death, a Numenorean greatsword made by his ancestors found in Maldwin's sacrifice pile. He has stated explicitly in character that he will touch the Palantir.",facts:["Iron of Death: Numenorean greatsword, bane vs. orcs and trolls, bonus action attack","Holds the silver ring key to the Palantir lockbox in Lake Town","Said in character: 'For sure gonna touch that Palantir' — despite Elrond's warning","Shouted 'FUCK YOU!' at three trolls (speed 40) then sprinted into night (speed 25)"],funny:["Shouted 'FUCK YOU!' at three trolls — they gave chase at 40 speed vs his 25","Had 'Santa's Little Helper' on forehead — discovered by Finn the blacksmith","Beorn: 'You should have known better. A black obsidian pendant is obviously cursed.'"],arc:"Tyr carries the weight of Numenorean heritage. He leads, he navigates, he fights. And he is going to touch the Palantir."}

{num:"8",title:"Into the Hill",
summary:"Orc tunnels beneath the barn followed east to a troll cave. Gilgamesh investigated the wine barrel and got buzzed. The party hotboxed the tunnel with pipe weed. Tyr was spotted by returning trolls. Shouted FUCK YOU and sprinted into the night.",
events:[
"Locked barn shed breached: wine barrels, farm ledgers, pipe weed discovered",
"Gilgamesh investigated the wine barrel — failed Constitution save — got noticeably buzzed; Tyr's arrow then punctured the barrel; improvised cooking-pot catchment system",
"Horn of the Ruins blown into the trap door: confirmed the tunnel system below",
"Party descended into the orc tunnels beneath the barn floor",
"Tyr wrote his will in ink while walking through the tunnel",
"The party hotboxed the tunnel with pipe weed during the traverse",
"The troll cave at the tunnel's end: large chamber with a vine-curtained opening",
"Trolls returned from raiding at dusk while the party was still investigating",
"Tyr attempted to slip out past the returning trolls — was spotted",
"Shouted FUCK YOU at three trolls (his movement speed: 40) — then sprinted into the night (his actual speed: 25)",
"Session cliffhanger: three trolls in pursuit of Tyr in the dark"
]},
{num:"9.1",title:"Borin Escorts Leah",
summary:"Borin's solo arc. All roleplay, no combat. Carried Leah on his back until she fell asleep on his shoulders. Delivered her safely to the Weaver cottage. Stayed an hour with the grieving family. Saw smoke on the horizon. Waved until out of sight. Then ran.",
events:[
"Borin and Leah set off from the party split point; she cycled between sobbing and whimpering",
"Leah confirmed: orcs came up through a tunnel in the barn floor; her brother walked in and was cut down immediately; she heard screams and ran",
"About two miles in: Leah's legs gave out; she climbed onto Borin's back; fell asleep on his shoulders within thirty minutes",
"Borin made a terrible dad joke — she gave him a half-hearted laugh; it was enough",
"Found the stacked-stone trail marker (perception 11 with advantage); the offshoot path climbed steeply up a large hill",
"Arrived at the Weaver cottage; dog Rusty ran out first; Eowyn and Halrick emerged and went immediately defensive (Did he hurt you?); Leah vouched for him",
"Borin set down his greataxe to show he was not a threat",
"Delivered news of the family deaths carefully; Halrick sat on the front steps in stunned silence; Eowyn broke down weeping",
"Stayed inside for over an hour sharing grief; Leah officially welcomed permanently into the Weaver household",
"Stepped outside when the grief became too much — his own wife and children were on his mind",
"Perception dirty 20 at ~5pm: thick column of smoke rising from approximately 10-12 miles away in the direction the party had gone",
"Session ends: Borin alone at dusk, watching something burn on the horizon"
]},
{num:"9.2",title:"The Troll Fight / Borin Returns",
summary:"Borin's harrowing solo return through the storm. Hid behind a dead cow from trolls. Three trolls killed. Jet-black dagger found inside a troll's thigh. Halrick gifted Borin a +1 warhammer. Party leveled up to Level 4.",
events:[
"Halrick retrieved a +1 versatile warhammer from his shed as a thank-you gift for bringing Leah safely; Borin traded his great club",
"Leah gave Borin a quiet hug before he left; he walked to the property edge waving until out of sight; then ran",
"Caught in a severe thunderstorm; sheltered under a rock outcropping; fashioned a large palm-leaf rain hat and named it Leafster",
"Arrived at the farmstead clearing: house burned to stone walls; three trolls loading corpses and loot",
"Hid behind a dead cow lying flat — 20 feet from the trolls — completely still",
"Nearly discovered twice; went to stand up during a lightning flash — flinched — dropped the warhammer on his foot — involuntary grunt — trolls heard it",
"Sprinted into the treeline; trolls gave brief chase then gave up; Borin urinated on himself; noted it was actually warm and somewhat comforting given how cold and wet he was",
"Broke the barn lock timing hammer blows to thunder (athletics 24); decided to follow troll tracks rather than descend into dark tunnels alone",
"Arrived at the cave entrance just as Mayo burst through the vines — initiative called",
"TROLL FIGHT: All three trolls killed; Gilgamesh pulled the big troll's loincloth rope and it fell prone; Mungo scored Nat 20 + Nat 19 for 45 damage killing one troll; Borin delivered the killing blow on the one that had spotted him in the field",
"Jet-black dagger found inside one troll's thigh — the body had grown flesh around it; blade ~4-5 inches, no runes, perfectly sized for a halfling",
"Party leveled up to Level 4"
]},
{num:"10.2",title:"The Long Night After",
summary:"Horn of the Ruins conflict exploded — Carl knocked Dudo unconscious and broke his kneecap. Carl sent to the barn. Borin forced reconciliation. Ravine ambush — Carl's liver wound. Eli the Tinker appeared with the recovered wagon.",
events:[
"Morning: Dudo tried to blow the Horn; Carl grabbed it back; Mungo swung at Carl's legs; Dudo caught Mungo's arm; escalating chaos",
"Borin slammed Horic's Iron Hand Fang into the ground — DC 13 knockdown; Carl and Dudo went prone; Gilgamesh was mid-urination and soaked himself",
"Carl's greataxe accidentally swung and knocked Dudo unconscious; Dudo fell backward onto a rock and broke his kneecap (8-day injury — movement halved)",
"Borin picked up Mungo and threw him at Gilgamesh (caught him like a torpedo); then physically placed Carl and Dudo facing each other and tilted them until they made eye contact; forced handshakes",
"Carl sent to the barn for the morning to cool down",
"Mungo sanitized a wound by dipping his finger in his health potion — the potion turned from gold to nasty yellow",
"Ravine ambush at near-sunset: 5 orcs from each side + goblin archers at the top firing poison arrows",
"Carl went to 0 HP — stabbed through the liver; liver wound condition: poisoned for 2 days, cannot drink alcohol",
"Gilgamesh used Ring of Mending to revive Carl to 1 HP; Carl immediately got up and hit the orc that dropped him",
"Mungo charged up the ravine cliff at the goblin archer yelling FOR CARL! — then killed him",
"Eli the Tinker appeared around the corner driving the party's wagon — claimed he found it abandoned in a field"
]},
{num:"11",title:"The Tinker's Teeth",
summary:"Eli's true nature revealed. Cursed obsidian pendants. Poisoned mead — entire party fell except Borin and Tyr. Captured, imprisoned in a pit. Join or die ultimatum from a makeshift throne. Beorn arrived in the night and killed all six bandits alone in the dark. Eli escaped with the Black Speech booklet.",
events:[
"Eli led the party to an ancient circular ruin for shelter; distributed obsidian pendant trinkets as good luck charms — secretly cursed attunement devices",
"Party slept with pendants — became attuned to Eli's mental assault power",
"Next day: merchant caravan offered mead; Borin and Tyr resisted (Constitution save 17+ at disadvantage); everyone else fell unconscious",
"Carl slumped over and fell onto Borin while driving the wagon; Borin grabbed the reins",
"Six bandit horsemen surrounded the wagon; Borin and Tyr were the only conscious fighters — 2 vs 6",
"Borin took 24 total damage across multiple rounds before going down; both eventually hog-tied",
"Woke as prisoners in the wagon — off the main road; Borin recognized Eli's voice, confirming Eli directed the bandits from the beginning",
"Brought to a briar-patch camp inside a 15-foot briar maze; thrown into a pit ~7-8 feet deep under a stone grate; all weapons removed",
"While in the pit: overheard bandits discussing their failure to find a specific item in Bree that the orcs were supposed to help them access — they would have to report to the boss",
"That item was the Palantir — which Elrond had already moved to Lake Town",
"Eli brought them out: makeshift throne, whole lamb roasting on a spit, join us or die ultimatum",
"Eli demonstrated pendant control: snapped his fingers — Carl's eyes rolled back; 30-second jolt dropped Carl to the ground (Carl had been verbally provoking Eli and earned each pulse)",
"Party returned to pit to think over options; took a full long rest in the pit",
"Night: Beorn arrived in bear form — glowing red eyes, ungodly huge; roaring; screaming; silence; sniffing; red eyes at the grate; lifted the stone; pulled Mungo out first",
"Mungo threw a knife and ladder down for the rest; everyone freed",
"Beorn in human form (massive 10-foot man): war is brewing in the east; they must hurry to Rivendell; the intel must reach Elrond immediately",
"Beorn explained the obsidian pendant curse; working radius is a couple hundred feet — the party is safe as long as Eli is not near them",
"Beorn called Tyr out: You should have known better. A black obsidian pendant — nothing more obvious of a cursed item.",
"Eli was NOT among the six bodies — escaped before Beorn arrived with the Black Speech booklet, the party's wagon, and both horses",
"Mungo lit the briar camp on fire — dry briars caught fast and burned completely",
"Three days walking on foot north to the East Road, then east toward Rivendell"
]},
{num:"12",title:"The Last Road to Rivendell",
summary:"Corrupted wolves producing toxic green mist — do NOT burn these. An illusory waterfall entrance. The healing pool at Rivendell cleared every ailment any party member had carried since the campaign began.",
events:[
"Final stretch east toward Rivendell; vegetation increasingly sickly and green-tinged",
"Corrupted wolves encountered — producing toxic green mist when killed or burned; DO NOT burn these; the mist is from Dol Guldur's lingering influence",
"Tyr's hidden paranoia condition from Session 11 fired secretly — he appeared aggressive and reckless but the party didn't question it",
"An illusory waterfall appeared across the road; Mayo walked into it and disappeared momentarily; emerged on the other side in the valley",
"First sight of Rivendell: a bowl of peace, tucked beneath the immense shoulders of the mountains — pale shining stone and dark timber, light from every window",
"Two elven guards escorted the party to a bathing chamber with a natural heated pool",
"The healing pool cleared every ailment, wound, curse, scar, and condition for everyone who bathed — Tyr's paranoia lifted; Dudo's kneecap healed completely",
"Borin stripped immediately the moment the guards left — first naked into the pool, no hesitation",
"Dudo to Carl in the pool: I think I can finally fully forgive you. My knee — it feels... I'm all better. Carl: I think I can finally forgive you for touching my horn.",
"Party given silver-gray elven robes and told Elrond would receive them when ready"
]},
{num:"13",title:"The Last Homely House",
summary:"Elrond's audience — Palantiri revealed, mission given, key ring assigned. Drinking contest aftermath. Two days east to the Misty Mountain foot. Sacrificial village found. A 16-year-old drawn in the lottery and sacrificed. Salted pork feast used to escape.",
events:[
"Elrond was already aware of the party — Aragorn had been filing reports on Tyr specifically through Ranger channels",
"Elrond revealed the Palantiri: nine seeing stones made by Feanor; the Enemy possesses at least one and has been using it",
"Elrond placed a Palantir in Bree nearly a century ago — the Red Claw assault on Bree and Eli's operation were both attempts to locate it before Elrond could move it",
"Elrond moved the Bree Palantir to Lake Town — this explains the entire Red Claw assault on Bree",
"Mission: travel to Lake Town (~300 miles northeast) and retrieve the Palantir before the Enemy can use or corrupt the master of Lake Town through it",
"Gilgamesh protested giving Tyr the key ring — Elrond gave it to Tyr anyway",
"Tyr's response to receiving the key ring: For sure gonna touch that Palantir.",
"Elrond inscribed elvish runes (including his personal signature) into Tyr's sword personally — now +1 to hit",
"Gilgamesh had a suppressed physical reaction when the village sacrifice creature was described — caught by Mungo (Nat 20) and Tyr (19); they exchanged knowing looks; Gilgamesh deflected; unresolved",
"Informal drinking contest after the formal audience — everyone except Gilgamesh fell unconscious",
"Gilgamesh: Quite the show you put on for me last night.",
"Morning: outfitted with elven forest-green cloaks (+2 stealth), 2 health potions each, Lembas bread, salted pork, and a detailed map",
"Horses sent back to Rivendell on Elrond's advice — the pass is inhumane for such creatures",
"Two days east brought them to the Misty Mountain foot; encountered Bonkey at a stream muttering just gotta make it through another night",
"Followed Bonkey to a small fortified village; witnessed the lottery; Tom — a 16-year-old — drew the last number; was hog-tied and throat-slit as the night's offering",
"Confronted village leader Tyndell the next morning; shared salted pork with the starving village; slipped out the front gate while the townsfolk ate"
]},
{num:"14",title:"Into the Green Dark",
summary:"Fled the village through increasingly swampy terrain. Fence chase escape. Alligator ambush — Mungo grappled underwater. Dead Marshes water hazard: ghostly faces caused paralysis. Ben (Tom's brother, 19 years old) joined. Carl served as living alligator bait.",
events:[
"Village noticed the party's absence; chase through the trees; fence escape sequence — Carl ran straight through the fence at full sprint (4 damage, created a party-sized hole everyone else used)",
"Tracked the creature's green slime trail through increasingly dark and twisted swamp",
"Alligator ambush: two 12-15 foot gators; Mungo grappled underwater; Gilgamesh scored a Nat 20-equivalent shot between the alligator's eyes — killed it instantly, freed Mungo. DON'T DO THAT SHIT TO ME!",
"Dead Marshes water hazard: party fell into a sharp drop-off; half-decomposed ghostly faces beneath the water locked viewers in place with fear-paralysis; Borin wrapped a rope around a tree and pulled",
"Ben emerged from behind a tree: 19 years old, brother of Tom, crude bow and 3-4 arrows, wants only revenge; insight check 24 confirmed he was completely truthful; party voted to let him come",
"Ben said only: I want to watch him die. I want to be there when he dies.",
"Carl volunteered as living alligator bait — waded into the lake splashing to draw ~15 gators to the near shore; hauled back just in time; said he trusted the party with his life",
"Gilgamesh spotted the pale green logs that were actually alligators floating behind the party (perception 19)",
"Party began swimming toward the island at session end"
]},
{num:"15",title:"Blood for Bloom",
summary:"The Stump. Dudo's blood activated the bone altar. Zombie combat. Ben charged Maldwin the instant he saw him — killed instantly. Two-phase boss fight. Mayo shut the wardrobe. Listen here, you stupid witch — you're not even a wizard! Mungo's blind killing throw. The killing blow.",
events:[
"Party climbed onto the island; pulsating green veins, shifting runes, spongy ground leaving no footprints",
"Bone altar on the ground floor: Dudo cut his hand; a few drops multiplied to fill all the grooves; the DM lingered on this moment; vine-ramp staircase built itself",
"Zombie combat on the ground floor: five killed; Borin's unarmed strike broke the last one's neck",
"Maldwin stepped out from beside the wardrobe: the last sea warden of the true light, keeper of the heart stolen from Valinor",
"Maldwin's monologue: former healer and father; his people destroyed by Dol Guldur while the lords of Rivendell counted stars; found the Valinor seed in Dol Guldur's ruins; planted it; 19 winters of blood; zombie army aimed at Rivendell; offered the party eternal life from the cauldron",
"Maldwin immediately identified Gilgamesh as an elf and became consumed with rage — elves and this corruption have history",
"Ben charged the instant he saw Maldwin — no words, no plan, no hesitation — Maldwin killed him instantly. Maldwin then raised him as a zombie.",
"Mungo killed reanimated Ben: sorry I gotta do this to ya",
"BOSS FIGHT: Carl's critical hit triggered phase 2 — Listen here, you stupid witch — you're not even a wizard! — four d12 damage dice",
"Mayo ran 30 feet across the room and slammed the wardrobe shut (strength 12 — barely enough) before more zombies could emerge",
"Gilgamesh toppled the wardrobe (strength 13 + Rhymes die = 23 vs DC 20); wardrobe crashed down; party piled bodies on top",
"Phase 2: Maldwin swelled to Huge size, became partially translucent, unleashed a 30-foot acid cone (4d6, DC 14 Dex save)",
"Mungo was blinded by acid; ran across the room; located Maldwin by sound; threw his dagger on disadvantage — hit Maldwin in the side of the head; Maldwin had 4 HP remaining and collapsed. The killing blow.",
"The table erupted."
]},
{num:"16",title:"The Seed of the Fallen Trees",
summary:"Second zombie wave through the walls — 6-7 breach points. Dudo's sword fell during ceiling climb — hit Tyr's neck — Tyr went to 0 HP from friendly fire. Mayo's death save Nat 20. Mungo catapulted to ceiling. Dudo carved the node free with a Nat 20 — all zombies dropped. Tyr found the Iron of Death. Level up.",
events:[
"Three zombies up the vine ramp immediately; Tyr climbed onto Mayo's shoulders",
"Tyr attacked the ceiling node (Nat 20 and 21 rolled — took lower = 21 to hit at disadvantage); 16 damage; all zombies in the room briefly seized",
"Dudo climbed the vined ceiling to reach the node; sword knocked from his hand on a missed strike — fell directly onto Tyr's neck; Tyr went to 0 HP from friendly fire",
"Gilgamesh used the Ring of Mending to revive Tyr to 1 HP",
"6-7 zombie breach points through the walls simultaneously — second wave from all directions",
"Mungo threw his dagger up to Dudo (Nat 20 — stuck into the ceiling center); Dudo grabbed it",
"Borin used Baruch Kazan (DC 15 Charisma check): 5 of 6 zombies became frightened for one round",
"Carl used Leadership: 4 HP granted to Tyr, Gilgamesh, Borin, and Mungo simultaneously",
"Mayo went down to a zombie bite — death save Nat 20 — stabilized at 1 HP; Borin woke her with gentle face-slaps; her first words: That hurt",
"Tyr went down a second time from a zombie attack at 1 HP; Gilgamesh poured a health potion on him (Medicine 6 — botched; went down the wrong pipe; Tyr hacked most of it up but survived; spent the rest of the fight coughing)",
"Tyr and Borin locked arms; catapulted Mungo to the ceiling (Nat 20 + 4 modifier = 24); Mungo drove his short sword into the node for 14 damage",
"Dudo carved the node free with a Nat 20 — approximately 19 damage; the node split; a large gray seed pod fell from the ceiling",
"All zombies dropped simultaneously; every glowing green pair of eyes extinguished at once; Maldwin's body dissolved into gray goo",
"Tyr's Nat 20 Lore check: seed pod is corrupted lineage of the Two Trees of Valinor; planted to breed an army for Rivendell; the party was TWO DAYS from Rivendell the entire time they were in the swamp",
"Tyr found the Iron of Death buried at the bottom of the confiscated weapons pile — the only item in perfect condition after decades of neglect",
"Party leveled up"
]},
{num:"17.2",title:"Out of the Stump, Into the Mountains",
summary:"Escaped via the alligator lake. Discovery: there was a BOAT the entire time. Carl had seen it. Said nothing. Borin nearly drowned under his gold. Mountain ascent. Giant bat creatures flying north. Orc ping within 3 miles. Two large unknown creatures at camp. Session ends mid-initiative. \uD83D\uDD34",
events:[
"Dawn exit through the alligator lake — stealth check sequence for the swim",
"Discovery: A BOAT was tied to the far side of the stump THE ENTIRE TIME. Carl had seen it during the island approach. Said nothing. The party had swum through alligators.",
"Borin sank under the weight of his gold and equipment in the lake — Mayo dove in after him and pulled him out",
"Exited the swamp; backtracked toward the mountains; from elevated ground saw the village location — vultures circling, faint smoke; party voted not to return",
"Mountain ascent: winding game trail, vegetation thinning to bare rock, temperature dropping sharply",
"Giant bat-like creatures observed flying north in formation carrying humanoid corpses — entirely unknown species; Tyr's lore check: 9 — completely outside his knowledge base",
"A symmetrical black cloud crossed the sun briefly — not weather",
"Borin's Rumor of the Earth at dusk camp: orcs within 3 miles — living or corpse-carried by the bats, unknown",
"Tyr found a rocky cove shelter (Nature Nat 20 with Dudo's assistance to remove exhaustion disadvantage)",
"No fire agreed — bat creatures overhead made fire too risky despite the cold and damp",
"Night watch: Tyr heard a faint howl around midnight; thought he heard a twig snap; Borin took over watch",
"2-3 AM: Tyr's perception 21 — definite large shadow, shuffling and sniffing approximately 40-50 feet out; woke Mungo",
"Tyr lit an arrow and fired blind at the sound (16 to hit at disadvantage) — hit one of two large furry shapes; 20 total damage; loud yelp-roar",
"SESSION ENDS MID-INITIATIVE. Two large unknown creatures. \uD83D\uDD34"
]},
];

function renderItems() {
  const p = document.createElement('div');
  p.className = 'page';
  p.innerHTML = '<div class="page-head"><h1>Items of Note</h1><p>Significant gear — who has it, what it means</p></div>';
  const inner = document.createElement('div');
  inner.style.padding = '0 16px';
  ITEMS.forEach(it => {
    const c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = '<div style="display:flex;gap:11px;align-items:flex-start">'
      + '<div style="font-size:28px">' + it.emoji + '</div>'
      + '<div><div style="font-family:Cinzel,serif;font-size:14px;color:#e6cc84">' + it.name + '</div>'
      + '<div style="color:' + (it.holder.includes('ELI')?'#8b2828':'#7a6030') + ';font-size:12px;margin-bottom:6px">Held by: ' + it.holder + '</div>'
      + '<p style="font-size:15px;line-height:1.65;margin-bottom:6px">' + it.desc + '</p>'
      + (it.q ? '<div style="background:#2c2a1e;border-radius:4px;padding:6px 10px;font-size:13px;color:#9a8a6a;font-style:italic">❓ ' + it.q + '</div>' : '')
      + '</div></div>';
    inner.appendChild(c);
  });
  p.appendChild(inner);
  return p;
}

  p.innerHTML = '<div class="page-head"><h1>Bestiary</h1><p>Every creature the party has encountered</p></div>';

      + '<div style="font-size:24px">' + b.emoji + '</div>'

function renderFactionDetail(f) {
  const p = document.createElement('div');
  p.className = 'page';
  const inner = document.createElement('div');
  inner.style.padding = '0 16px';
  inner.appendChild(backBtn('Factions', () => navigate('factions')));
  inner.innerHTML += '<div style="font-size:30px;margin-bottom:8px">' + f.emoji + '</div>'
    + '<div style="font-family:Cinzel,serif;font-size:18px;color:#e6cc84;margin-bottom:4px">' + f.name + '</div>'
    + '<div style="color:#9a8a6a;font-size:13px;margin-bottom:12px">' + f.alignment + '</div>';
  const descCard = document.createElement('div');
  descCard.className = 'card';
  descCard.style.marginBottom = '12px';
  descCard.innerHTML = '<p style="font-size:15px;line-height:1.7">' + f.desc + '</p>';
  inner.appendChild(descCard);
  ['Relationship to Party|partyRel', 'Known Members|members'].forEach(pair => {
    const [label, key] = pair.split('|');
    const lbl = document.createElement('span');
    lbl.className = 'section-label';
    lbl.textContent = label.toUpperCase();
    inner.appendChild(lbl);
    const val = f[key];
    if (Array.isArray(val)) {
      val.forEach(m => {
        const row = document.createElement('div');
        row.className = 'fact-row';
        row.innerHTML = '<div class="dot">·</div><div style="font-size:15px;line-height:1.65">' + m + '</div>';
        inner.appendChild(row);
      });
    } else {

      d.style.cssText = 'font-size:15px;line-height:1.65;margin-bottom:12px;padding-left:12px;border-left:2px solid #383020';
      d.textContent = val;
      inner.appendChild(d);
    }
  });
  p.appendChild(inner);
  return p;
}

  const inner = document.createElement('div');

    bar.style.cssText = 'min-width:4px;width:4px;background:' + (i===TIMELINE.length-1?'#8b2828':'#7a6030') + ';align-self:stretch;border-radius:2px;margin-top:4px';
    const txt = document.createElement('div');
    txt.innerHTML = '<div style="font-family:Cinzel,serif;font-size:11px;color:#7a6030;letter-spacing:.08em;margin-bottom:2px">' + t.date + '</div>'
