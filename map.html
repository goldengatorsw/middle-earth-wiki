<script type="text/babel">

const C={bg:"#0d0b08",s1:"#191410",s2:"#222018",s3:"#2c2a1e",bd:"#383020",g:"#c8a44a",gl:"#e6cc84",gd:"#7a6030",tx:"#ede3cc",dm:"#9a8a6a",mt:"#5a4e38",re:"#8b2828"};

const cri={fontFamily:"'Crimson Text',Georgia,serif"};

// All coordinates are on a 900x520 canvas
const LOCATIONS=[
  {

    sessions:"Sessions 1-5",
    facts:["The Battle of Bree — ~250 orcs attacked; ~175 killed","Gilgamesh's barrel explosion destroyed the gate","Borin negotiated 2,000 gold + shield + horses from Mayor Graf","Carl was drunk polishing his greataxe before the battle"]

  {

  },
  {
    id:"farmstead",x:370,y:284,label:"The Farmstead",major:false,status:"visited",
    emoji:"🔥",statusLabel:"Cleared — house burned",
    desc:"A civilian farmstead used by Red Claw orcs as a fortified position. Dudo burned the building. Mungo killed three orcs inside silently. Beneath the barn: tunnels east.",

    facts:["Dudo shot fire arrows — building burned to stone walls","Mungo killed three orcs silently inside","Black Speech booklet found on the Chieftain's body","Beneath the barn: tunnels leading east toward troll country","Leah's family was killed here"]
  },
  {

    sessions:"Sessions 8-9.2",
    facts:["Three trolls killed — 15-foot leader + two 14-foot subordinates","Jet-black dagger found growing inside a troll's thigh","Borin arrived just as Mayo triggered initiative","Tyr shouted FUCK YOU at three trolls and sprinted into the night"]
  },
  {
    id:"briar-camp",x:310,y:348,label:"Briar-patch Camp",major:false,status:"destroyed",
    emoji:"⚠️",statusLabel:"DESTROYED — Mungo burned it",

    sessions:"Session 11",

    sessions:"Sessions 14-17",
    facts:["Dudo's blood activated the bone altar","A BOAT was tied to the far side the ENTIRE TIME — Carl had seen it","Mayo ran 30 feet to slam the wardrobe shut — prevented a fight-ending zombie wave","Mungo threw a blind dagger and killed Maldwin — the killing blow","All zombies dropped when Dudo carved the ceiling node with a Nat 20"]

  {

    sessions:"Sessions 17.2 — ACTIVE 🔴",
    facts:["~1,000 feet elevation on the High Pass","Giant bat creatures observed flying north carrying humanoid corpses","Orc ping within 3 miles at dusk camp","Two owlbears at camp — one already hit for 20 damage","SESSION 18 OPENS HERE 🔴"]
  }
];

// Party movement path — sequence of [x,y] coordinates tracing the journey
const PATH_SEGMENTS=[
  // Sessions 1-2: Start at Chetwood, go to Bree
  {label:"Sessions 1-2",color:"#6a9a5a",points:[[196,248],[148,268]],dashed:false},
  // Session 3: Bree → Grey Watch → back to Bree
  {label:"Session 3 (east group)",color:"#6a9a5a",points:[[196,248],[232,224],[148,268]],dashed:false},
  // Sessions 4-5: Bree stays
  // Session 6-7: Road east to farmstead
  {label:"Sessions 6-7",color:"#8ab878",points:[[148,268],[220,272],[296,278],[370,284]],dashed:false},
  // Session 9.1: Borin solo to Weaver Cottage
  {label:"Session 9.1 (Borin solo)",color:C.gd,points:[[370,284],[382,238]],dashed:true},
  {label:"Session 9.1 (Borin return)",color:C.gd,points:[[382,238],[424,306]],dashed:true},
  // Sessions 8-9.2: Farmstead to troll cave
  {label:"Sessions 8-9.2",color:"#8ab878",points:[[370,284],[424,306]],dashed:false},
  // Session 11: Captured south to briar camp, then freed, walk north then east
  {label:"Session 11 (captured)",color:C.re,points:[[424,306],[380,326],[310,348]],dashed:true},
  {label:"Session 11 (freed, walk east)",color:"#8ab878",points:[[310,348],[310,292],[370,284],[440,278],[500,270],[576,224]],dashed:false},
  // Session 12-13: Rivendell
  // Sessions 13: East to mountain foot then south into swamp
  {label:"Session 13-14",color:"#a888cc",points:[[576,224],[612,252],[646,272],[660,304],[672,336]],dashed:false},
  // Sessions 17.2: Exit stump, back through swamp, up mountains
  {label:"Sessions 17-17.2",color:C.g,points:[[672,336],[660,296],[672,268],[694,236],[710,200]],dashed:false},
];

// Legend for the path colors
const LEGEND=[
  {color:"#8ab878",label:"Main party route"},
  {color:C.gd,label:"Borin's solo arc"},
  {color:C.re,label:"Captured / prisoner route"},
  {color:"#a888cc",label:"Into the swamp arc"},
  {color:C.g,label:"Exit & mountain ascent"},
];

// SVG terrain definitions
const TERRAIN=`
  <!-- Sky/ambient -->
  <!-- Misty Mountains range -->
  <path d="M640,180 L655,140 L668,165 L680,130 L695,158 L710,120 L726,155 L740,135 L755,160 L770,145 L785,170 L800,150 L820,180 L820,520 L640,520 Z" fill="#1a1a2a" opacity="0.9"/>
  <path d="M640,180 L655,140 L668,165 L680,130 L695,158 L710,120 L726,155 L740,135 L755,160 L770,145 L785,170 L800,150 L820,180" fill="none" stroke="#3a3a5a" stroke-width="1.5"/>
  <!-- Snow caps -->
  <path d="M655,140 L660,150 L650,148 Z" fill="#d0d0e0" opacity="0.6"/>
  <path d="M680,130 L686,142 L674,140 Z" fill="#d0d0e0" opacity="0.6"/>
  <path d="M710,120 L717,134 L703,132 Z" fill="#d0d0e0" opacity="0.6"/>
  <path d="M740,135 L747,148 L733,146 Z" fill="#d0d0e0" opacity="0.6"/>
  <path d="M770,145 L777,158 L763,156 Z" fill="#d0d0e0" opacity="0.5"/>
  
  <!-- Foothills -->
  <ellipse cx="630" cy="280" rx="40" ry="20" fill="#1e2218" opacity="0.7"/>
  <ellipse cx="610" cy="300" rx="50" ry="22" fill="#1e2218" opacity="0.6"/>
  
  <!-- The Chetwood forest (west) -->
  <ellipse cx="210" cy="250" rx="55" ry="35" fill="#1a2a1a" opacity="0.8"/>
  <ellipse cx="175" cy="240" rx="40" ry="25" fill="#1a2a1a" opacity="0.7"/>
  <!-- Tree dots -->
  <circle cx="190" cy="235" r="4" fill="#2a3a2a" opacity="0.9"/>
  <circle cx="205" cy="228" r="5" fill="#2a3a2a" opacity="0.9"/>
  <circle cx="220" cy="240" r="4" fill="#2a3a2a" opacity="0.9"/>
  <circle cx="195" cy="252" r="4" fill="#2a3a2a" opacity="0.8"/>
  <circle cx="212" cy="260" r="3" fill="#2a3a2a" opacity="0.8"/>
  <circle cx="175" cy="242" r="5" fill="#2a3a2a" opacity="0.8"/>
  <circle cx="186" cy="230" r="3" fill="#2a3a2a" opacity="0.9"/>
  
  <!-- Eastern forest (mixed) -->
  <ellipse cx="360" cy="250" rx="30" ry="18" fill="#1a2a1a" opacity="0.5"/>
  <ellipse cx="440" cy="260" rx="25" ry="14" fill="#1a2a1a" opacity="0.4"/>
  
  <!-- Corrupted forest near swamp -->
  <ellipse cx="660" cy="300" rx="45" ry="30" fill="#1a2a18" opacity="0.7"/>
  <ellipse cx="640" cy="320" rx="35" ry="20" fill="#142214" opacity="0.8"/>
  <!-- Sickly tree dots -->
  <circle cx="645" cy="302" r="4" fill="#2a3a22" opacity="0.8"/>
  <circle cx="658" cy="295" r="5" fill="#2a3a22" opacity="0.8"/>
  <circle cx="670" cy="308" r="3" fill="#2a3a22" opacity="0.7"/>
  <circle cx="650" cy="318" r="4" fill="#243222" opacity="0.8"/>
  
  <!-- Swamp (southeast) -->
  <ellipse cx="668" cy="342" rx="38" ry="22" fill="#142018" opacity="0.9"/>
  <ellipse cx="680" cy="352" rx="25" ry="14" fill="#0e1810" opacity="0.9"/>
  <!-- Swamp water texture -->
  <path d="M648,338 Q658,334 668,338 Q678,342 688,338" fill="none" stroke="#1e3820" stroke-width="1" opacity="0.7"/>
  <path d="M652,346 Q664,342 676,346" fill="none" stroke="#1e3820" stroke-width="1" opacity="0.6"/>
  
  <!-- The Swamp Lake (around the stump) -->
  <ellipse cx="672" cy="334" rx="22" ry="14" fill="#0c1c14" opacity="0.95"/>
  <ellipse cx="672" cy="334" rx="18" ry="11" fill="#0a1810" opacity="0.95"/>
  
  <!-- The East Road -->
  <path d="M148,270 Q220,272 296,276 Q370,280 440,278 Q510,276 576,260" fill="none" stroke="#4a3820" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.7"/>
  
  <!-- Hill country (mid-east) -->
  <ellipse cx="420" cy="295" rx="30" ry="15" fill="#1e1e16" opacity="0.5"/>
  <ellipse cx="450" cy="305" rx="25" ry="12" fill="#1e1e16" opacity="0.4"/>

  <!-- A river flowing south from the mountains -->
  <path d="M640,230 Q635,260 630,290 Q625,320 618,350" fill="none" stroke="#1a3040" stroke-width="2" opacity="0.6"/>

  <!-- Weathertop in distance (far east, background) -->
  <path d="M800,200 L810,175 L820,200" fill="#252530" opacity="0.5"/>
  <text x="810" y="172" text-anchor="middle" fill="#3a3a5a" font-family="Cinzel,serif" font-size="8" opacity="0.5">Weathertop</text>
`;

export default function App(){
  const[sel,setSel]=useState(null);
  const[hover,setHover]=useState(null);
  const[showLegend,setShowLegend]=useState(false);
  const[showPath,setShowPath]=useState(true);
  const[panelPos,setPanelPos]=useState({x:0,y:0});
  const svgRef=useRef(null);
  const containerRef=useRef(null);

  const loc=sel?LOCATIONS.find(l=>l.id===sel):null;

  const handleLocClick=(locId,e)=>{
    e.stopPropagation();
    if(sel===locId){setSel(null);return;}
    setSel(locId);
  };

  const statusColor=(s)=>{
    if(s==="current")return C.re;
    if(s==="visited")return C.g;
    if(s==="unknown")return C.gd;
    if(s==="destroyed")return C.mt;
    if(s==="cleared")return"#4a7a46";
    return C.dm;
  };

  const dotSize=(loc)=>loc.major?10:7;
  const dotGlow=(loc)=>loc.status==="current"?C.re:loc.major?C.g:statusColor(loc.status);

  return(
    <div ref={containerRef} style={{width:"100%",height:"100vh",background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:C.s1,borderBottom:`1px solid ${C.bd}`,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div>
          <div style={{...cin,fontSize:16,color:C.gl,letterSpacing:"0.08em"}}>Campaign Map</div>
          <div style={{...cri,fontSize:12,color:C.dm}}>Wanderings In Middle Earth · Through Session 17.2</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowPath(!showPath)} style={{background:showPath?C.gd+"33":"none",border:`1px solid ${showPath?C.gd:C.bd}`,color:showPath?C.gl:C.dm,padding:"5px 12px",borderRadius:5,cursor:"pointer",...cin,fontSize:10,letterSpacing:"0.05em"}}>
            {showPath?"Path On":"Path Off"}
          </button>
          <button onClick={()=>setShowLegend(!showLegend)} style={{background:showLegend?C.gd+"33":"none",border:`1px solid ${showLegend?C.gd:C.bd}`,color:showLegend?C.gl:C.dm,padding:"5px 12px",borderRadius:5,cursor:"pointer",...cin,fontSize:10,letterSpacing:"0.05em"}}>
            Legend
          </button>
        </div>
      </div>

      {/* Map area */}
      <div style={{flex:1,position:"relative",overflow:"hidden"}} onClick={()=>setSel(null)}>
        <svg ref={svgRef} viewBox="0 0 900 420" style={{width:"100%",height:"100%",display:"block"}} preserveAspectRatio="xMidYMid meet">
          {/* Background */}
          <rect width="900" height="420" fill="#111008"/>
          {/* Terrain texture — subtle noise overlay */}
          <rect width="900" height="420" fill="url(#noise)" opacity="0.03"/>

          {/* Terrain */}
          <g dangerouslySetInnerHTML={{__html:TERRAIN}}/>

          {/* Cardinal directions */}
          <text x="20" y="30" fill={C.mt} style={{...cin}} fontSize="10" opacity="0.6">N</text>
          <text x="20" y="400" fill={C.mt} style={{...cin}} fontSize="10" opacity="0.6">S</text>
          <text x="870" y="215" fill={C.mt} style={{...cin}} fontSize="10" opacity="0.6">E</text>
          <text x="8" y="215" fill={C.mt} style={{...cin}} fontSize="10" opacity="0.6">W</text>

          {/* Distance indicator */}
          <line x1="50" y1="390" x2="150" y2="390" stroke={C.mt} strokeWidth="1" opacity="0.5"/>
          <line x1="50" y1="386" x2="50" y2="394" stroke={C.mt} strokeWidth="1" opacity="0.5"/>
          <line x1="150" y1="386" x2="150" y2="394" stroke={C.mt} strokeWidth="1" opacity="0.5"/>
          <text x="100" y="404" textAnchor="middle" fill={C.mt} style={{...cri}} fontSize="9" opacity="0.6">~50 miles</text>

          {/* "Lake Town" label (destination, off-map) */}
          <text x="780" y="130" fill={C.gd} style={{...cin}} fontSize="9" opacity="0.7" letterSpacing="0.08em">Lake Town →</text>
          <text x="783" y="142" fill={C.mt} style={{...cri}} fontSize="8" opacity="0.5">(~150 miles NE)</text>
          <path d="M775,136 L760,160 L765,160" fill="none" stroke={C.gd} strokeWidth="1" opacity="0.4" strokeDasharray="2,2"/>

          {/* Party path segments */}
          {showPath && PATH_SEGMENTS.map((seg,i)=>{
            const pts=seg.points.map(p=>p.join(",")).join(" ");
            return(
              <g key={i}>
                <polyline
                  points={pts}
                  fill="none"
                  stroke={seg.color}
                  strokeWidth={seg.dashed?1.5:2}
                  strokeDasharray={seg.dashed?"5,4":"none"}
                  opacity={seg.dashed?0.6:0.8}
                  strokeLinejoin="round"
                  strokeLinecap="round"
                />
                {/* Arrow heads on key segments */}
                {!seg.dashed && seg.points.length>=2 && (()=>{
                  const n=seg.points.length;
                  const p1=seg.points[n-2];
                  const p2=seg.points[n-1];
                  const dx=p2[0]-p1[0];
                  const dy=p2[1]-p1[1];
                  const len=Math.sqrt(dx*dx+dy*dy);
                  if(len<5)return null;
                  const nx=dx/len;const ny=dy/len;
                  const ax=p2[0]-nx*8;const ay=p2[1]-ny*8;
                  const perp1=[ax-ny*4,ay+nx*4];
                  const perp2=[ax+ny*4,ay-nx*4];
                  return<polygon points={`${p2[0]},${p2[1]} ${perp1[0]},${perp1[1]} ${perp2[0]},${perp2[1]}`} fill={seg.color} opacity="0.8"/>;
                })()}
              </g>
            );
          })}

          {/* Party start marker */}
          {showPath && <g>
            <circle cx="196" cy="248" r="5" fill="none" stroke={C.g} strokeWidth="1.5" opacity="0.5" strokeDasharray="2,2"/>
            <text x="198" y="236" fill={C.gd} style={{...cin}} fontSize="8" opacity="0.7">Start</text>
          </g>}

          {/* Location dots */}
          {LOCATIONS.map(loc=>{
            const isHovered=hover===loc.id;
            const isSelected=sel===loc.id;
            const col=dotGlow(loc);
            const size=dotSize(loc);
            return(
              <g key={loc.id} style={{cursor:"pointer"}}
                onClick={(e)=>handleLocClick(loc.id,e)}
                onMouseEnter={()=>setHover(loc.id)}
                onMouseLeave={()=>setHover(null)}
              >
                {/* Glow ring for current/major */}
                {(loc.status==="current"||loc.major)&&(
                  <circle cx={loc.x} cy={loc.y} r={size+5}
                    fill="none" stroke={col}
                    strokeWidth="1.5" opacity={isSelected||isHovered?0.7:0.3}
                  />
                )}
                {/* Pulse ring for current location */}
                {loc.status==="current"&&(
                  <circle cx={loc.x} cy={loc.y} r={size+9}
                    fill="none" stroke={C.re}
                    strokeWidth="1" opacity="0.2"
                    strokeDasharray="3,3"
                  />
                )}
                {/* Main dot */}
                <circle cx={loc.x} cy={loc.y} r={size}
                  fill={isSelected?col:C.s2}
                  stroke={col}
                  strokeWidth={isSelected||isHovered?2:1.5}
                  opacity={isHovered||isSelected?1:0.9}
                />
                {/* Inner fill for major */}
                {loc.major&&!isSelected&&(
                  <circle cx={loc.x} cy={loc.y} r={size-3} fill={col} opacity="0.4"/>
                )}
                {/* Dot emoji or indicator */}
                {loc.status==="current"&&(
                  <circle cx={loc.x} cy={loc.y} r={3} fill={C.re} opacity="0.9"/>
                )}
                {/* Label */}
                <text
                  x={loc.x}
                  y={loc.y-(size+6)}
                  textAnchor="middle"
                  fill={isSelected||isHovered?C.gl:col}
                  style={{...cin}}
                  fontSize={loc.major?10:8.5}
                  letterSpacing="0.04em"
                  opacity={isSelected||isHovered?1:0.85}
                >{loc.label}</text>
              </g>
            );
          })}
        </svg>

        {/* Info panel — slides up from bottom when location selected */}
        {loc&&(
          <div onClick={e=>e.stopPropagation()} style={{
            position:"absolute",bottom:0,left:0,right:0,
            background:C.s1,borderTop:`1px solid ${C.bd}`,
            padding:"14px 16px 16px",
            maxHeight:"55%",overflowY:"auto",
            transition:"all 0.2s ease"
          }}>
            {/* Close */}
            <button onClick={()=>setSel(null)} style={{position:"absolute",top:12,right:14,background:"none",border:"none",color:C.dm,cursor:"pointer",fontSize:20,padding:0,lineHeight:1}}>×</button>

            {/* Header */}
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,paddingRight:30}}>
              <div style={{fontSize:26}}>{loc.emoji}</div>
              <div>
                <div style={{...cin,fontSize:16,color:C.gl,letterSpacing:"0.06em"}}>{loc.label}</div>
                <div style={{...cri,fontSize:12,color:statusColor(loc.status),marginTop:2}}>{loc.statusLabel}</div>
              </div>
              <div style={{marginLeft:"auto",textAlign:"right"}}>
                <span style={{background:C.gd+"22",color:C.gd,border:`1px solid ${C.gd}44`,borderRadius:3,padding:"2px 8px",fontSize:9,...cin,letterSpacing:"0.06em"}}>{loc.sessions}</span>
              </div>
            </div>

            {/* Description */}
            <p style={{...cri,fontSize:15,color:C.tx,lineHeight:1.65,marginBottom:10}}>{loc.desc}</p>

            {/* Facts */}
            <div style={{...cin,fontSize:9,color:C.gd,letterSpacing:"0.12em",marginBottom:8}}>KEY FACTS</div>
            {loc.facts.map((f,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}>
                <div style={{color:C.gd,fontSize:12,marginTop:1,flexShrink:0}}>·</div>
                <div style={{...cri,fontSize:14,color:loc.status==="current"?C.gl:C.tx,lineHeight:1.6}}>{f}</div>
              </div>
            ))}
          </div>
        )}

        {/* Legend panel */}
        {showLegend&&(
          <div onClick={e=>e.stopPropagation()} style={{
            position:"absolute",top:10,right:10,
            background:C.s1+"ee",border:`1px solid ${C.bd}`,
            borderRadius:8,padding:"12px 14px",minWidth:180
          }}>
            <div style={{...cin,fontSize:10,color:C.gd,letterSpacing:"0.12em",marginBottom:10}}>PATH LEGEND</div>
            {LEGEND.map((l,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                <svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke={l.color} strokeWidth="2"/></svg>
                <div style={{...cri,fontSize:12,color:C.tx}}>{l.label}</div>
              </div>
            ))}
            <div style={{borderTop:`1px solid ${C.bd}`,marginTop:10,paddingTop:10}}>
              <div style={{...cin,fontSize:10,color:C.gd,letterSpacing:"0.12em",marginBottom:8}}>LOCATION STATUS</div>
              {[["Visited & cleared",C.g],["Current location 🔴",C.re],["Unknown status",C.gd],["Destroyed",C.mt]].map(([label,col])=>(
                <div key={label} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="none" stroke={col} strokeWidth="1.5"/><circle cx="7" cy="7" r="2" fill={col} opacity="0.5"/></svg>
                  <div style={{...cri,fontSize:12,color:C.tx}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Hover tooltip for non-selected */}
        {hover&&!sel&&(()=>{
          const h=LOCATIONS.find(l=>l.id===hover);
          if(!h)return null;
          return(
            <div style={{
              position:"absolute",
              left:Math.min(h.x*0.95,700),
              top:Math.max(h.y*0.85-60,10),
              background:C.s1+"f0",
              border:`1px solid ${C.bd}`,
              borderRadius:5,padding:"6px 10px",
              pointerEvents:"none",
              transform:"translateX(-50%)"
            }}>
              <div style={{...cin,fontSize:11,color:C.gl}}>{h.label}</div>
              <div style={{...cri,fontSize:11,color:C.dm}}>{h.statusLabel}</div>
            </div>
          );
        })()}

        {/* Tap instruction */}
        {!sel&&!hover&&(
          <div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",background:C.s1+"cc",border:`1px solid ${C.bd}`,borderRadius:20,padding:"6px 16px",...cri,fontSize:12,color:C.dm,whiteSpace:"nowrap",pointerEvents:"none"}}>
            Tap a location for details
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
